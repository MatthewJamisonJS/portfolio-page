{{ $data := index site.Data site.Language.Lang }}
{{ with $data.reel.reel }}
{{ if .enable }}
{{ $loops := where .loops "enabled" true }}
{{ if gt (len $loops) 0 }}
<figure class="aeo-reel" aria-labelledby="aeo-reel-eyebrow" aria-describedby="aeo-reel-description">
  {{ with .eyebrow }}
  <p id="aeo-reel-eyebrow" class="aeo-reel-eyebrow">
    <span class="aeo-reel-eyebrow-dot" aria-hidden="true"></span>
    <span>{{ . }}</span>
  </p>
  {{ end }}

  <p id="aeo-reel-description" class="sr-only">{{ i18n "aeo_reel_description" }}</p>

  {{ range $loops }}
  <article class="aeo-reel-card" data-loop="{{ .slug }}">
    <header class="aeo-reel-card-head">
      <span class="aeo-reel-engine">{{ .engine | default .slug }}</span>
      <span class="aeo-reel-tag" aria-hidden="true">{{ i18n "aeo_reel_live_capture" }}</span>
    </header>
    <div class="aeo-reel-frame">
      <video class="aeo-reel-video"
             autoplay loop muted playsinline
             preload="none"
             poster="{{ .poster | relURL }}"
             width="800" height="500"
             aria-label="{{ .aria_label }}">
        <source src="{{ .mp4 | relURL }}" type="video/mp4">
      </video>
    </div>
  </article>
  {{ end }}

  <footer class="aeo-reel-foot">
    <button class="aeo-reel-pause"
            type="button"
            aria-pressed="false"
            data-aeo-pause
            data-pause-label="{{ i18n "aeo_reel_pause" }}"
            data-resume-label="{{ i18n "aeo_reel_resume" }}">
      <span class="aeo-reel-pause-icon" aria-hidden="true">▮▮</span>
      <span class="aeo-reel-pause-label">{{ i18n "aeo_reel_pause" }}</span>
    </button>
    {{ with .disclaimer }}<p class="aeo-reel-disclaimer">{{ . }}</p>{{ end }}
  </footer>
</figure>
<script>
  (function () {
    var btn = document.querySelector('[data-aeo-pause]');
    var videos = document.querySelectorAll('.aeo-reel-video');
    if (!videos.length) return;

    var pauseLabel = btn ? btn.getAttribute('data-pause-label') : 'Pause';
    var resumeLabel = btn ? btn.getAttribute('data-resume-label') : 'Resume';

    // Tighten clip-reel pacing — browser default 1.0× is too slow for the
    // scroll-snap takeover; 1.7× lands closer to skim-speed without the
    // tone-shift you get above ~2×. Re-applied on loadedmetadata / play
    // because some engines reset playbackRate on each loop iteration.
    var TARGET_RATE = 1.7;
    function applyRate(v) { try { v.playbackRate = TARGET_RATE; } catch (e) {} }
    videos.forEach(function (v) {
      applyRate(v);
      v.addEventListener('loadedmetadata', function () { applyRate(v); });
      v.addEventListener('play', function () { applyRate(v); });
    });

    // Honor prefers-reduced-motion (WCAG 2.3.3 / 2.2.2): suppress autoplay,
    // pre-pause both videos, mark user-paused so IO will not auto-resume.
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) {
      videos.forEach(function (v) {
        v.removeAttribute('autoplay');
        v.dataset.userPaused = 'true';
        try { v.pause(); } catch (e) {}
      });
      if (btn) {
        btn.setAttribute('aria-pressed', 'true');
        btn.querySelector('.aeo-reel-pause-icon').textContent = '▶';
        btn.querySelector('.aeo-reel-pause-label').textContent = resumeLabel;
      }
    }

    // Manual pause button (WCAG 2.2.2)
    if (btn) {
      btn.addEventListener('click', function () {
        var paused = btn.getAttribute('aria-pressed') !== 'true';
        btn.setAttribute('aria-pressed', paused ? 'true' : 'false');
        btn.querySelector('.aeo-reel-pause-icon').textContent = paused ? '▶' : '▮▮';
        btn.querySelector('.aeo-reel-pause-label').textContent = paused ? resumeLabel : pauseLabel;
        videos.forEach(function (v) {
          v.dataset.userPaused = paused ? 'true' : 'false';
          if (paused) {
            v.pause();
          } else {
            var p = v.play();
            if (p && p.catch) p.catch(function () {});
          }
        });
      });
    }

    // Pause off-screen videos to save battery / CPU
    if ('IntersectionObserver' in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var v = entry.target;
          if (v.dataset.userPaused === 'true') return;
          if (entry.isIntersecting) {
            var p = v.play();
            if (p && p.catch) p.catch(function () {});
          } else {
            v.pause();
          }
        });
      }, { threshold: 0.25 });
      videos.forEach(function (v) { io.observe(v); });
    }
  })();
</script>
{{ end }}
{{ end }}
{{ end }}
