pricing:
  enable: true
  title: "Tres niveles honestos"
  pick_label: "Cómo elegir"
  pick_text: "Si tienes tiempo y quieres aprender — Auditoría. Si quieres que esté bien hecho pero lo ejecutarás después — Implementación y Entrega. Si quieres que lo gestionemos nosotros y no quieres pensar en ello — Servicio Gestionado."
  footnote: "La Auditoría se acredita a la Implementación si continúas. Sin contratos largos. Limitamos el primer año a 5 clientes de St. Louis — crecimiento lento significa servicio profundo."
  tiers:
    - slug: "audit"
      name: "Auditoría"
      price: "$250"
      cadence: "una sola vez"
      # Structured-price fields drive ProfessionalService.offers[].priceSpecification
      # in head.html (audit H7 fix). The visible `price` / `cadence` strings stay for
      # human display in the pricing card; the schema reads from these numeric fields.
      price_min: "250"
      price_max: "250"
      price_currency: "USD"
      price_unit: "one-time"
      highlight: false
      use_when: "Eres escéptico y quieres ver el trabajo antes de comprometerte. Lo arreglarás tú mismo después."
      includes:
        - "Auditoría de visibilidad completa"
        - "Lista de arreglos priorizada"
        - "Sesión de 1 hora"
        - "Tú implementas"
      cta_label: "Empezar con una auditoría"
      cta_link: "?service=audit#contact"
    - slug: "setup"
      name: "Implementación y Entrega"
      price: "$700"
      cadence: "una sola vez"
      price_min: "700"
      price_max: "700"
      price_currency: "USD"
      price_unit: "one-time"
      highlight: true
      use_when: "Quieres que esté bien hecho y luego lo ejecutas tú tras una sesión de capacitación."
      includes:
        - "Todo lo de Auditoría"
        - "Implementación realizada"
        - "Sesión de capacitación"
        - "Tú lo ejecutas después"
      cta_label: "Elegir Implementación y Entrega"
      cta_link: "?service=setup#contact"
    - slug: "dfy"
      name: "Servicio Gestionado"
      price: "$500–1,200"
      cadence: "al mes"
      price_min: "500"
      price_max: "1200"
      price_currency: "USD"
      price_unit: "per month"
      highlight: false
      use_when: "Tienes presupuesto pero no tiempo. Quieres que se gestione de extremo a extremo."
      includes:
        - "Todo lo de Implementación"
        - "Optimización mensual"
        - "Contenido y reseñas"
        - "Informes + estrategia"
      cta_label: "Hablar de una retención"
      cta_link: "?service=dfy#contact"
  # Schema-only Offer; mirrored from data/en/pricing.yml.
  # Consumed by ProfessionalService.offers in head.html. Audit H6 reframe.
  intake:
    enable: true
    name: "Recepción de brief de proyecto"
    description: "Recepción por correo electrónico. Primera respuesta en 48 a 96 horas."
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "Consulta gratuita"
