why:
  enable: true
  title: "Ihre Kunden fragen die KI nach Unternehmen wie Ihrem."
  subtitle: "Die meisten Unternehmen sind dafür unsichtbar."
  intro: "Sechs Fakten, alle aus öffentlichen Quellen, die Sie in 30 Sekunden nachprüfen können. Sie bauen das Argument Schritt für Schritt auf."
  stats:
    - id: "adoption"
      headline: "45 % der Verbraucher fragen die KI nach lokalen Geschäftsempfehlungen — vor einem Jahr waren es 6 %."
      body: "Der Übergang vom Stichwort-Eintippen zur Chatbot-Anfrage vollzieht sich schneller als der Wechsel von den Gelben Seiten zu Google."
      source_label: "BrightLocal, Local Consumer Review Survey 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "zero-click"
      headline: "93 % aller KI-Suchsitzungen enden ohne einen einzigen Klick auf eine Website."
      body: "Das Zitat ist die Conversion. Die KI antwortet, der Käufer entscheidet, der Besuch findet nie statt. Wer nicht zitiert wird, ist nicht im Gespräch."
      source_label: "Branchenforschung, Zusammenstellung 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "citation-share"
      headline: "60 % der Zitate in AI Overviews gehen an Drittanbieter-Seiten. Nur 40 % zitieren einzelne Unternehmen direkt."
      body: "Sie kämpfen auf zwei Fronten: von Yelp, Reddit, Quora zitiert werden — und selbst zitiert werden. Beides erfordert strukturierte, maschinenlesbare Inhalte."
      source_label: "AI Overview Zitatanalyse, 2026"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "overlap"
      headline: "AI Overviews erscheinen bei ~48 % der erfassten Suchanfragen, doch nur 17 % der zitierten Quellen stehen auch in Googles organischen Top 10."
      body: "Auf Seite 1 von Google zu ranken bedeutet nicht, dass die KI Sie zitiert. AEO ist eine eigene Sichtbarkeitsfläche."
      source_label: "Whitespark AI Overviews Studie, 2026"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "search-shift"
      headline: "25 % des gesamten Suchtraffics verlagern sich bis Ende dieses Jahres zur KI."
      body: "Die frühe Prognose, die 2024 nach Science-Fiction klang, liest sich heute wie ein Zeitplan."
      source_label: "Gartner-Prognose, Februar 2024"
      source_url: "https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents"
    - id: "gbp-rank"
      headline: "Das Google Business Profile bleibt der #1-Rankingfaktor für lokale Ergebnisse — in der KI-Suche und in der klassischen Suche."
      body: "Ist Ihr Profil nicht beansprucht, halb leer oder ohne Fotos, übertrifft diese eine Korrektur alles andere, was Sie tun können."
      source_label: "Whitespark, 2026 Local Search Ranking Factors"
      source_url: "https://whitespark.ca/local-search-ranking-factors/"
  outro:
    body: "Kurzfassung: Wir strukturieren Ihre Website, Ihr Google Business Profile und Ihre Drittanbieter-Einträge so, dass KI-Tools Sie zitieren, wenn Kunden fragen. Dazu gehören ChatGPT, Perplexity, Google AI Overview und Claude. [Sehen Sie, was wir konkret tun](/different/) und wie wir die Sichtbarkeit in KI-Suche, klassischer Suche und Drittanbieter-Einträgen prüfen."
    cta_label: "Sehen Sie, was wir konkret tun"
    cta_link: "/different/"
