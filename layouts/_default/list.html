{{ define "main" }}

<!-- navigation rendered once in baseof.html; do not call partial here -->

<!-- Start Blog Section -->
<section id="blog" class="section">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="title text-center wow fadeInDown">
          <h2>{{ .Title }}</h2>
          <div class="border-meghna"></div>
        </div>
      </div>
      {{ $paginator := .Paginate .Data.Pages }}
      {{ range $paginator.Pages }}
      {{ .Render "article" }}
      {{ end }}
      <div class="col-12">
        {{ template "_internal/pagination.html" . }}
      </div>
    </div>
  </div>
</section>
<!-- /blog -->

{{ end }}
