faq:
  enable: true
  title: "Common questions"
  items:
    - question: "What is AEO and how is it different from SEO?"
      answer: "AEO (Answer Engine Optimization) structures your site so AI tools quote you when someone asks: ChatGPT, Perplexity, Google AI Overviews, Claude. SEO targets the ten blue links; AEO targets the quoted answer. Same scaffolding underneath (schema, page speed, content quality), different goal. SEO builds discoverability; AEO builds authority an engine can cite. [See why this matters now](/why/)."

    - question: "What are robots.txt and schema markup, and why do they matter for AEO?"
      answer: "Two files do most of the work. Your <a href='https://developers.google.com/search/docs/crawling-indexing/robots/intro' rel='external nofollow'>robots.txt</a> tells the AI crawlers whether they can read your site — and in 2026 that's a split decision: the search crawlers that feed answers (OAI-SearchBot, Claude-SearchBot, PerplexityBot) are worth allowing by name, while the training crawlers (GPTBot, ClaudeBot) are a separate choice you make on purpose. Your <a href='https://schema.org/' rel='external nofollow'>schema markup</a> tags each page with structured data (hours, prices, FAQs, address) so engines know what you do. Most sites block the search crawlers by accident and ship zero schema. Fix both and you go from invisible to readable."

    - question: "Is AI search really replacing Google?"
      answer: "<a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner forecast traditional search volume dropping 25% by 2026</a>, and <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe reported AI traffic to U.S. retail sites up 393% year-over-year in Q1 2026</a>. Search isn't disappearing; AI is taking share. The customers asking an assistant for a recommendation are real, and the share keeps climbing."

    - question: "How much does this cost?"
      answer: "It depends on whether you're buying a read or buying the work. The AEO / AI Visibility Diagnostic is $1,750 one-time, credited toward implementation if you continue. Standalone implementation runs $2,500–$6,500 by scope. Productized programs are $5,500 for the 30-day sprint and $12,000–$18,000 for the 90-day program. Retainers are $2,500, $5,000, or $8,500 a month. For a single-location small business there are fixed-price packages from $495. Out-of-scope work is billed at $225/hr. [Full breakdown on the pricing page](/pricing/)."

    - question: "What's the difference between the diagnostic and implementation?"
      answer: "The diagnostic is a read: where you stand across the major engines, what's blocking you, and a prioritized roadmap, delivered in 10–14 days. Implementation is the work itself — corrected robots.txt, validated schema, answer-first rewrites, Google Business Profile and NAP, Bing and IndexNow. Most people start with the diagnostic and roll its cost into implementation if they proceed. You can also skip straight to a program or retainer if you already know the shape of the problem."

    - question: "What do the retainers include?"
      answer: "Three tiers, and most clients land in the middle. Foundation ($2,500/mo) is maintenance, monitoring, and a monthly report for a business holding ground it's already gained. Growth ($5,000/mo) adds schema upkeep, a content cadence, citation building, and monthly AI-visibility tracking. Concierge ($8,500/mo) is full-service SEO + AEO + GEO with proprietary reporting, earned-media outreach, and quarterly strategy — for businesses treating AI visibility as a real channel. [Compare them on the pricing page](/pricing/#retainers)."

    - question: "How long until I see results?"
      answer: "First changes show in about 30 days; steady state lands around month six. Month one often reads like a net loss, because we're fixing foundational problems — years of unclaimed listings, missing schema, blocked crawlers — that should have been handled long ago. By month twelve the ROI compounds. Anyone promising faster is lying or breaking Google's rules."

    - question: "Can you guarantee a #1 ranking or a ChatGPT citation?"
      answer: "No, and we'll say why. Retrieval-augmented pipelines re-rank probabilistically, and a single model update can replace a large share of previously cited sources overnight — Gemini 3's rollout did exactly that in early 2026. What we guarantee instead is transparent work: every month you see what we did, you keep full access to your accounts, and you can leave anytime. A guarantee of placement in an AI answer is a guarantee no one can keep."

    - question: "Do you only work with St. Louis businesses?"
      answer: "No. Gateway is based in St. Louis, Missouri, and works with B2B clients nationwide, remotely. Local service businesses with tight geography tend to see the fastest movement, because answer engines weigh local intent heavily and the field is thin — but the same work makes a nationally-selling firm citable too. Where you are matters less than whether engines can read and trust you."

    - question: "What's your relationship to Jamison Software Solutions?"
      answer: "Two LLCs, one founder. Jamison Software Solutions builds and owns client websites; Gateway Tech AEO does the search-visibility work — for JSS clients on a white-label basis, or directly for businesses that already have a site they're happy with. They're distinct legal entities that reference each other as related organizations, which is also how we model the entity work for any client running more than one brand."

    - question: "What if I already have an SEO person?"
      answer: "AEO and SEO overlap, so solid SEO work makes AEO easier. We coordinate with an existing SEO team instead of replacing them. Start with the diagnostic: it pinpoints which AEO gaps need closing without redoing what already works. Plenty of clients keep both."

    - question: "What if I don't even have a website?"
      answer: "You can get cited without one. Engines pull from Google Business Profile, Yelp, Foursquare, and Apple Business Connect, so we claim and complete those first. When a site does make sense, we build it AEO-native — schema-first, answer-first, Bing and IndexNow wired from launch — rather than retrofitting one later. Your site is the one asset you fully control; the listings are the foundation engines find first."

    - question: "What about my Google Business Profile?"
      answer: "For a local business it's the highest-ROI lever there is. A complete profile can move you into the local 3-pack in 30–60 days with nothing else changing. If yours is unclaimed, half-empty, or photo-less, that's where the work starts. The <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>Whitespark 2026 Local Search Ranking Factors report</a> still ranks GBP #1 for local pack visibility."

    - question: "What if I want to stop?"
      answer: "Stop. You own everything — your domain, your GBP, your accounts, your content — and there's no contract longer than month-to-month. If the work isn't paying off, leave; we'd rather know than lock you in. Locking clients in is a tell that the work can't keep them on merit."

    - question: "Is 'AEO' the same as Answer Engine Optimization?"
      answer: "Yes. AEO and Generative Engine Optimization (GEO) point at the same thing; the industry hasn't settled on one term. (Note: AEO is also American Eagle Outfitters' stock ticker, but the trademark class is different — retail apparel versus marketing services — so no conflict.)"

    - question: "Can I do this myself?"
      answer: "Some of it, yes. The fixed-price packages are built for that: an AI Visibility Quick Check ($495) tells you where you stand and the three things to fix first, and a Schema Pack ($895) hands you validated LocalBusiness, FAQPage, and Person schema generated from your real data. Most owners can clear the high-impact items in an afternoon — robots.txt, Bing Webmaster Tools, schema basics. [See the small-business packages](/pricing/#flat-packages)."
