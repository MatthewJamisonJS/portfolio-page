name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly off-peak baseline scan. CodeQL queries get updated upstream
    # and a periodic re-run catches issues that newly-published queries
    # detect against unchanged code.
    - cron: '23 7 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Theme submodule is meghna (HTML/CSS only) and CodeQL doesn't
          # scan HTML; skipping the checkout saves ~30s per matrix leg.
          submodules: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
