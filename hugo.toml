################################# Default configuration ###################
baseURL = "/"
title = "Gateway Tech AEO — AI search optimization for St. Louis local businesses"
theme = "meghna"
# Default time zone for time stamps
timeZone = "America/Chicago"
# post pagination
pagination.pagerSize = 6
# post excerpt
summaryLength = 15
# multilingual support enabled (5 languages: en, es, ja, fr, de)
disableLanguages = []
hasCJKLanguage = true

############################# Build ##############################
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = '(js|scripts|javascript)'
[[build.cachebusters]]
source = 'assets/.*\.(css|sass|scss)$'
target = '(css|styles|scss|sass)'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'

############################# Outputs ##############################
[outputs]
home = ["HTML", "RSS"]
page = ["HTML"]

############################# Imaging ##############################
[imaging]
quality = 85
resampleFilter = "lanczos"

############################# Minify ###############################
[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false
  disableJSON = false
  disableXML = false
  disableSVG = false
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false
    [minify.tdewolff.css]
      precision = 2
      keepCSS2 = false
    [minify.tdewolff.js]
      precision = 2
      keepVarNames = false

############################# Caches ###############################
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

############################# Markup ###############################
[markup]
[markup.goldmark.renderer]
unsafe = true

############################# Plugins ##########################
# css plugins
[[params.plugins.css]]
link = "plugins/bootstrap/bootstrap.purged.min.css"  # Purged: 152KB → 60KB (92KB savings)
# themify-icons removed post-rebrand (no <i class="ti-*"> in editorial layout)
# Removed unused plugins (magnific-popup, slick)
# fonts.css inlined in head.html for zero render-blocking

# js plugins
[[params.plugins.js]]
link = "plugins/jquery/jquery.min.js"
[[params.plugins.js]]
link = "plugins/bootstrap/bootstrap.min.js"
# Removed unused plugins (slick, shuffle, magnific-popup) - 120KB savings
[[params.plugins.js]]
link = "plugins/lazy-load/lozad.min.js"

############################# Default Parameters ##########################
[params]
logo = "images/logo.png"
# Meta data
description = "Answer Engine Optimization for St. Louis local businesses. Get cited by ChatGPT, Perplexity, and Google's AI Overview — before your competitors do."
author = "Matthew Jamison"
# Google Analytics (add your tracking ID when ready)
google_analytics_id = ""
# post share
post_share = true

# preloader
[params.preloader]
enable = false
preloader = "images/logo.png"

# cookies
[params.cookies]
enable = false
expire_days = 2

# google map (disabled for now)
[params.map]
enable = false

############################# social marks ##########################
# Each entry's `brand` slug maps to a real inline brand SVG in
# layouts/partials/footer.html. Marks come from Simple Icons (CC0).
[[params.social]]
brand = "github"
label = "GitHub"
link = "https://github.com/MatthewJamisonJS"

[[params.social]]
brand = "linkedin"
label = "LinkedIn"
link = "https://www.linkedin.com/in/matthew-jamison-65486bab/"

