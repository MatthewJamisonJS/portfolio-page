home:
  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "¿Qué es la Optimización para Motores de Respuesta?"
      body: |
        AEO es el trabajo que haces para que las herramientas de IA te citen cuando alguien pregunta. ChatGPT, Perplexity, Google AI Overviews, Claude, Apple Intelligence, Bing Copilot. El SEO perseguía los diez enlaces azules; el AEO apunta a ser la respuesta citada. Misma higiene técnica (schema, velocidad de página, URLs limpias), línea de meta distinta. El SEO construyó visibilidad. El AEO construye algo que un motor puede citar.

        Cómo busca la gente ha cambiado. En lugar de escribir una palabra clave y escanear una página de resultados, le hacen la pregunta completa a un asistente — "¿quién es el mejor plomero de emergencia en el sur de St. Louis que abre temprano?", o "¿qué empresas hacen AEO para SaaS B2B?" — y reciben uno o dos nombres, a veces un enlace, muchas veces ningún enlace en absoluto. Si no estás en esa respuesta, el resto de tu marketing no llega a tener turno.

    - id: "why-matters-local"
      heading: "Por qué esto importa ahora"
      body: |
        La búsqueda dejó de ser diez enlaces azules. La gente le pregunta a un asistente y actúa según lo que le responde. La encuesta de BrightLocal de 2026 situó el uso de IA para recomendaciones de negocios en el 45 %, frente al 6 % del año anterior; el cambio de las Páginas Amarillas a Google nunca se movió tan rápido. La clave está en que ser citado no es lo mismo que posicionarse. Whitespark encontró AI Overviews en aproximadamente el 48 % de las consultas rastreadas, pero solo alrededor del 17 % de las fuentes que esas respuestas citan también aparecen en el top diez orgánico de Google. Puedes dominar la primera página y seguir siendo invisible en la respuesta.

        La mayoría de los negocios son invisibles a esto por razones simples: un robots.txt que bloquea los crawlers, sin schema, fichas que nadie ha reclamado. Esa es la brecha, y se amplía cada trimestre. [Lee los seis hechos que lo respaldan.](/why/)

    - id: "how-we-work"
      heading: "Cómo se secuencia el trabajo"
      body: |
        Dos capas, en orden. **Eligibilidad** primero — la entidad existe, los crawlers pueden alcanzarla, las respuestas son legibles por máquinas. **Citabilidad** después — suficientes fuentes externas te corroboran para que un motor confíe en ti lo bastante para nombrarte. Verter autoridad sobre una base rota no amplifica nada, así que no lo hacemos.

        La mayoría de los contratos comienzan con un diagnóstico: un análisis de dónde estás en los principales motores y exactamente qué te está bloqueando, acreditado al precio si continúas con la implementación. A partir de ahí es implementación con alcance definido, o un programa de 30 o 90 días — lo que encaje con cuánto quieres gestionar tú frente a lo que quieres delegar. [Consulta el menú completo y lo que cuesta cada opción.](/pricing/)

    - id: "who-this-for"
      heading: "Para quién es esto, y para quién no"
      body: |
        Negocios que quieren ser la respuesta que da un motor. Las empresas de servicios locales con geografía ajustada funcionan especialmente bien, porque los motores de respuesta ponderan mucho la intención local y el campo competitivo es escaso; las empresas B2B que venden a nivel nacional también se benefician, ya que sus compradores investigan preguntando. El trabajo tiene la misma forma en cualquier caso: hacer la entidad legible y luego hacer que la citen.

        No trabajamos con proyectos de criptomonedas o NFT, estructuras de MLM, contenido adulto, venta de armas, ni nadie bajo acción regulatoria activa. Y no prometemos citas — las tuberías de recuperación reclasifican según su propio calendario, y una actualización de modelo puede desplazar de un día para otro una parte de las fuentes que antes citaban. Lo que prometemos es un trabajo honesto que puedes verificar y cuentas que tú controlas completamente.

    - id: "day-one-deliverables"
      heading: "Qué se conecta primero"
      body: |
        La base son unos pocos archivos que la mayoría de los sitios no tiene. El **marcado schema** etiqueta tu negocio, horarios, dirección, reseñas y FAQs en el formato estructurado que los motores leen de forma nativa. **robots.txt** se corrige para la división de crawlers de 2026 — los crawlers de búsqueda que alimentan respuestas (OAI-SearchBot, Claude-SearchBot y PerplexityBot) permitidos por nombre; los crawlers de entrenamiento (GPTBot, ClaudeBot) quedan como una decisión separada que tomas a propósito, no por accidente. Un **mapa del sitio verificado** más **IndexNow** y **Bing Webmaster Tools** cubren la señal de mayor palanca y menor coste que la mayoría de los equipos omiten, y un **llms.txt** apunta a las herramientas de IA hacia lo que tiene licencia y lo que está fuera de límites.

        Después la capa local: Google Business Profile reclamado y completado, un NAP canónico (nombre, dirección, teléfono) propagado por los directorios que los motores realmente ingieren, schema de reseñas añadido para que las valoraciones con estrellas viajen a las respuestas. Cada cambio aparece en un informe en lenguaje claro para que veas qué se hizo y por qué. Sin paneles de caja negra.
