pricing:
  enable: true
  title: "サービスと料金"
  subtitle: "ビジネスをAIに見つけられ、信頼され、引用されるために。"
  # Punchy lead above the tabs. Kept short on purpose.
  principle:
    label: "進め方"
    body: "適格性優先、次に引用可能性。"

  # ---------------------------------------------------------------------------
  # PRESENTATION: CSS-only segmented tabs (mirrors jamisonsoftwaresolutions.com
  # /services). `tabs` = the segmented control; each group carries a `tab` and a
  # `display` (feature | cards | rows).
  # Each item shows a 4-word `what` + 4-word `why` + CTA on the page. The longer
  # `scope` is NOT rendered — it feeds ProfessionalService.offers[] in head.html
  # and the ServiceCatalog ItemList (rich, citable detail for answer engines).
  # ---------------------------------------------------------------------------
  tabs:
    - id: "diagnostics"
      label: "診断・パッケージ"
    - id: "build"
      label: "実装・構築"
    - id: "programs"
      label: "プログラム"

  groups:
    - id: "diagnostic"
      tab: "diagnostics"
      display: "feature"
      name: "まずここから：AEO / AIビジビリティ診断"
      items:
        - slug: "diagnostic"
          name: "AEO / AIビジビリティ診断"
          price: "$1,750"
          cadence: "一回"
          price_min: "1750"
          price_max: "1750"
          price_currency: "USD"
          price_unit: "one-time"
          highlight: true
          what: "AIビジビリティレポート"
          why: "何が妨げているかを把握"
          scope: "Robots/クローラーアクセス監査（2026年の3層クローラー実態）、Google Business Profile + NAP整合性チェック、実際のプロンプトを使ったAIビジビリティスポットテスト、レビューと権威の読み解き、10〜15ページのレポート、30分通話、優先順位付きロードマップ。10〜14日で納品。継続される場合は実装費用に充当。"
          cta_label: "診断から始める"
          cta_link: "/?service=diagnostic#contact"

    - id: "flat-packages"
      tab: "diagnostics"
      display: "cards"
      name: "小規模ビジネス向け固定価格パッケージ"
      items:
        - slug: "quick-check"
          name: "AIビジビリティ・クイックチェック"
          price: "$495"
          cadence: "一回"
          price_min: "495"
          price_max: "495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "現状の速報スナップショット"
          why: "優先順位付きの3つの修正"
          scope: "主要エンジン全体での現状と、最初に修正すべき3つのこと。"
          cta_label: "クイックチェックを受ける"
          cta_link: "/?service=quick-check#contact"
        - slug: "schema-pack"
          name: "スキーマパック"
          price: "$895"
          cadence: "一回"
          price_min: "895"
          price_max: "895"
          price_currency: "USD"
          price_unit: "one-time"
          what: "検証済みschema、完成"
          why: "エンジンが読み取れる状態に"
          scope: "あなたの実データから生成し、GoogleのRich Results Testで検証したLocalBusiness + FAQPage + Personのschema。"
          cta_label: "スキーマパックを注文"
          cta_link: "/?service=schema-pack#contact"
        - slug: "audit-lite"
          name: "AEO監査（ライト）"
          price: "$1,495"
          cadence: "一回"
          price_min: "1495"
          price_max: "1495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "小規模ビジネス向け診断"
          why: "単一拠点に特化"
          scope: "単一拠点の小規模ビジネス向けにスケールした診断。"
          cta_label: "ライト監査を予約"
          cta_link: "/?service=audit-lite#contact"

    - id: "implementation"
      tab: "build"
      display: "feature"
      name: "Answer Engine Optimization — 実装"
      items:
        - slug: "implementation"
          name: "AEO実装"
          price: "$2,500–$6,500"
          cadence: "スコープによる"
          price_min: "2500"
          price_max: "6500"
          price_currency: "USD"
          price_unit: "by scope"
          what: "基盤を構築します"
          why: "引用される資格を得る"
          scope: "2026年クローラー区分に合わせたrobots.txtの修正（OAI-SearchBot、Claude-SearchBot、PerplexityBotを許可）。LocalBusiness、FAQPage、Personのschema、検証済み、表示コピーと一致したschemaテキスト。答え優先の書き直し——文頭に答えを。Google Business Profileの申請・整備、AIが収集するディレクトリに一つの正規NAPを展開。Bing Webmaster Tools、サイトマップ提出、IndexNow。"
          cta_label: "実装をスコープする"
          cta_link: "/?service=implementation#contact"

    - id: "website-build"
      tab: "build"
      display: "feature"
      name: "AEOネイティブウェブサイト構築"
      items:
        - slug: "build"
          name: "AEOネイティブウェブサイト構築"
          price: "$6,000–$15,000"
          cadence: "スコープによる"
          price_min: "6000"
          price_max: "15000"
          price_currency: "USD"
          price_unit: "by scope"
          what: "引用に備えた新サイト"
          why: "引用されるために作る"
          scope: "Schema優先のアーキテクチャ、エンティティ整合性を最初から組み込み、答え優先のコンテンツ、BingとIndexNowをローンチから配線。Jamison Software Solutions, LLCと共同で納品。"
          cta_label: "構築をスコープする"
          cta_link: "/?service=build#contact"

    - id: "programs"
      tab: "programs"
      display: "cards"
      name: "製品化されたプログラム"
      items:
        - slug: "sprint"
          name: "30日基盤スプリント"
          price: "$5,500"
          cadence: "30日プログラム"
          price_min: "5500"
          price_max: "5500"
          price_currency: "USD"
          price_unit: "30-day program"
          what: "30日で適格性を確立"
          why: "基盤を素早く固める"
          scope: "クローラーアクセス、schema、答え優先の書き直し、GBP + ディレクトリ、Bing + IndexNow。30日で適格性を確立。"
          cta_label: "スプリントを予約"
          cta_link: "/?service=sprint#contact"
        - slug: "program"
          name: "90日AIビジビリティプログラム"
          price: "$12,000–$18,000"
          cadence: "90日プログラム"
          price_min: "12000"
          price_max: "18000"
          price_currency: "USD"
          price_unit: "90-day program"
          highlight: true
          what: "適格性から引用可能性へ"
          why: "エンジンに名前を出してもらう"
          scope: "スプリントに加え、コンテンツのリズム、引用構築、獲得メディアの基盤づくり。適格性から初期引用可能性まで。"
          cta_label: "プログラムを計画する"
          cta_link: "/?service=program#contact"

  # Anti-guarantee posture (footer callout). Load-bearing honesty, not a disclaimer.
  wont_promise:
    label: "約束しないこと"
    body: "引用の保証はしません。モデルの更新一つで引用されていたソースが一夜で入れ替わることがあります。エビデンスが支持するものを実装し、それに対して誠実に報告します。"

  # Industries declined (footer callout).
  declined:
    label: "お断りする業種"
    items:
      - "暗号通貨またはNFT"
      - "MLMまたはネズミ講構造"
      - "アダルトコンテンツ"
      - "銃器販売"
      - "規制当局の調査下にある事業"

  footnote: "診断費用は実装に充当されます。スコープ固定のエンゲージメント、ロックインなし。St. Louis, MO — 全国対応、リモート。"

  # Schema-only Offer for free email intake. Consumed by ProfessionalService.offers
  # in head.html; not rendered in the catalog.
  intake:
    enable: true
    name: "プロジェクトブリーフ受付"
    description: "メール優先の受付。48〜96時間以内に初回返信。"
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "無料相談"
