home:
  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "What is Answer Engine Optimization?"
      body: |
        AEO means structuring your site so AI tools—ChatGPT, Perplexity, Google AI Overview, Claude—quote you when customers ask a question. Unlike classical SEO, which chases the ten blue links, AEO targets being the cited answer. The technical work overlaps (schema, page speed, clean URLs), but the goal is different: SEO builds discoverability; AEO builds authority you can verify and cite.

    - id: "why-matters-local"
      heading: "Why this matters for St. Louis local businesses"
      body: |
        45% of local consumers now ask AI for business recommendations—a shift from 6% a year ago that happened faster than the Yellow Pages-to-Google migration. Yet most St. Louis small businesses remain invisible to these tools. A blocked robots.txt, no schema markup, and unclaimed listings mean your competitors show up when AI searches for plumbers, accountants, and realtors; you don't. The customers are real, and the gap between "found by AI" and "not found" is growing fast.

    - id: "how-we-work"
      heading: "How we work"
      body: |
        Three pillars guide every decision: **Technical** (Can AI find you?), **Authority** (Can AI trust you?), **Content** (Do you answer what they ask?). We audit all three, produce a prioritized fix list, and help you act on it. [Learn what makes us different.](/different/) Pick the tier based on your bandwidth: Audit if you want to learn and implement yourself; Setup & Hand-off if you want it built right then you run it; Done-For-You if you want it managed end-to-end.

    - id: "who-this-for"
      heading: "Who this is for—and who it isn't"
      body: |
        This works for service businesses with tight geography: plumbers, electricians, HVAC, dental, legal, accounting, home repair. Real estate and retail fare better. If you're a SaaS trying to rank nationally on Google, classical SEO and paid ads own your ROI. If you're a local business in the St. Louis area, AEO is the unfair advantage. We cap at 5 clients per year because local work requires attention; if you need us to add you to a roster of 100+ others, we're not the fit.

    - id: "day-one-deliverables"
      heading: "What you get on day one"
      body: |
        We hand off four technical foundations. **Schema markup** tags your business, hours, address, reviews, FAQs in a format AI engines read natively. **robots.txt** explicitly allows GPTBot, ClaudeBot, PerplexityBot to crawl your site (most local businesses block AI by default). **Verified sitemap** lists all your pages so indexing is complete. **llms.txt** points AI tools toward your licensing, privacy policies, and any off-limits content. These four files take an afternoon to wire. Most local sites have zero of them. That's the gap.
      cta_text: "See detailed pricing"
      cta_link: "/pricing/"
