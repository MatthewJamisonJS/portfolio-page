      description: "La preuve du hero — catégories génériques d'entreprises de St. Louis citées par quatre moteurs, en boucle. Regardez les réponses choisir les gagnants."
    - title: "Crédibilité de l'écosystème Rails."
      description: "Développeur Ruby on Rails. Le framework propulse Shopify (5.5M+ marchands, ~19M de requêtes MySQL/s sur le monolithe). 194+ pull requests fusionnées, vérifiables sur GitHub."
    - title: "Posture d'opérateur transparent."
      description: "Tarifs publics. Plafond de clients public. Méthodes publiques. Pas de frais d'agence. Aucun NDA pour lire les méthodes."
    - title: "Affiliations locales."
      description: "Logos de la chambre + organisations de quartier de St. Louis dans le pied une fois les adhésions confirmées. Étiquette de ville physique près de chaque CTA."
    - title: "Contact direct avec le développeur."
      description: "E-mail, calendrier — pas de chef de projet, pas de bot. Délai de réponse annoncé, pas implicite."
