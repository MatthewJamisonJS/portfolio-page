  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "What is Answer Engine Optimization?"
      body: |
        AEO is the work you do so AI tools cite you when someone asks. ChatGPT, Perplexity, Google's AI Overviews, Claude, Apple Intelligence, Bing Copilot. SEO chased the ten blue links; AEO targets being the cited answer. Same technical hygiene underneath (schema, page speed, clean URLs), different finish line. SEO built discoverability. AEO builds something an engine can quote.

        How people search changed. Instead of typing a keyword and scanning a page of results, they ask the whole question — "who's the best emergency plumber in south St. Louis that opens early," or "which firms do AEO for B2B SaaS" — and they get one or two names back, sometimes a link, often no link at all. If you're not in that answer, the rest of your marketing never gets a turn.

    - id: "why-matters-local"
      heading: "Why this matters now"
      body: |
        Search stopped being ten blue links. People ask an assistant and act on what it says back. BrightLocal's 2026 survey put AI use for business recommendations at 45%, up from 6% a year earlier; the Yellow-Pages-to-Google shift never moved that fast. The catch is that being cited isn't the same as ranking. Whitespark found AI Overviews on roughly 48% of tracked queries, yet only about 17% of the sources those answers cite also sit in Google's organic top ten. You can own page one and still be absent from the answer.

        Most businesses are invisible to this for boring reasons: a robots.txt that blocks the crawlers, no schema, listings nobody claimed. That's the gap, and it widens every quarter. [Read the six facts behind it.](/why/)

    - id: "how-we-work"
      heading: "How the work is sequenced"
      body: |
        Two layers, in order. **Eligibility** first — the entity exists, crawlers can reach it, the answers are machine-readable. **Citability** second — enough outside sources corroborate you that an engine trusts you enough to name you. Pour authority on a broken foundation and you amplify nothing, so we don't.

        Most engagements open with a diagnostic: a read of where you stand across the major engines and exactly what's blocking you, credited back if you go on to implementation. From there it's scoped implementation, a 30- or 90-day program, or a monthly retainer — whatever matches how much you want to own yourself versus hand off. [See the full menu and what each costs.](/pricing/)

    - id: "who-this-for"
      heading: "Who this is for, and who it isn't"
      body: |
        Businesses that want to be the answer an engine gives. Local service companies with tight geography do especially well, because answer engines weigh local intent heavily and the competitive field is thin; B2B firms selling nationwide benefit too, since their buyers research by asking. The work is the same shape either way: make the entity legible, then make it cited.

        We don't take cryptocurrency or NFT projects, MLM structures, adult content, firearms sales, or anyone under active regulatory action. And we don't promise citations — retrieval pipelines re-rank on their own schedule, and one model update can swap out a chunk of previously cited sources overnight. What we promise is honest work you can verify and accounts you keep full control of.

    - id: "day-one-deliverables"
      heading: "What gets wired first"
      body: |
        The foundation is a handful of files most sites are missing. **Schema markup** tags your business, hours, address, reviews, and FAQs in the structured format engines read natively. **robots.txt** gets corrected for the 2026 crawler split — answer crawlers like `OAI-SearchBot`, `Claude-SearchBot`, and `PerplexityBot` allowed by name, training crawlers left as a separate decision you make on purpose, not by accident. A **verified sitemap** plus **IndexNow** and **Bing Webmaster Tools** cover the cheapest high-leverage signal most shops skip, and an **llms.txt** points AI tools at what's licensed and what's off-limits.

        Then the local layer: Google Business Profile claimed and completed, one canonical NAP (name, address, phone) propagated across the directories engines actually ingest, review schema added so star ratings travel into answers. Every change lands in a plain-language report, so you can see what was done and why. No black-box dashboards.
      cta_text: "See services & pricing"
      cta_link: "/pricing/"
