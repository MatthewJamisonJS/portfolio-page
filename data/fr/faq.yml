faq:
  enable: true
  title: "Questions fréquentes"
  items:
    - question: "Qu'est-ce que l'AEO et en quoi diffère-t-il du SEO ?"
      answer: "L'AEO (Answer Engine Optimization) structure votre site pour que les outils d'IA vous citent quand quelqu'un pose une question : ChatGPT, Perplexity, Google AI Overviews, Claude. Le SEO cible les dix liens bleus ; l'AEO cible la réponse citée. Même échafaudage en dessous (schema, vitesse de page, qualité du contenu), objectif différent. Le SEO construit la découvrabilité ; l'AEO construit l'autorité qu'un moteur peut citer. [Voyez pourquoi c'est urgent](/why/)."

    - question: "Que sont robots.txt et le balisage schema, et pourquoi comptent-ils pour l'AEO ?"
      answer: "Deux fichiers font la majeure partie du travail. Votre <a href='https://developers.google.com/search/docs/crawling-indexing/robots/intro' rel='external nofollow'>robots.txt</a> indique aux robots d'IA s'ils peuvent lire votre site — et en 2026, c'est une décision à trois niveaux : les robots de recherche qui alimentent les réponses (OAI-SearchBot, Claude-SearchBot, PerplexityBot) méritent d'être autorisés par nom, tandis que les robots d'entraînement (GPTBot, ClaudeBot) sont un choix distinct que vous faites délibérément. Votre <a href='https://schema.org/' rel='external nofollow'>balisage schema</a> étiquette chaque page avec des données structurées (horaires, prix, FAQ, adresse) pour que les moteurs sachent ce que vous faites. La plupart des sites bloquent accidentellement les robots de recherche et n'ont aucun schema. Corrigez les deux et vous passez d'invisible à lisible."

    - question: "La recherche IA remplace-t-elle vraiment Google ?"
      answer: "<a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner prévoit une baisse de 25 % du volume de recherche traditionnelle d'ici 2026</a>, et <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe a rapporté une hausse de 393 % du trafic IA vers les sites de vente au détail américains au T1 2026</a>. La recherche ne disparaît pas ; l'IA prend des parts. Les clients qui interrogent un assistant pour une recommandation sont bien réels, et cette part ne cesse de croître."

    - question: "Combien cela coûte-t-il ?"
      answer: "Cela dépend de si vous achetez une lecture ou le travail lui-même. Le diagnostic AEO / Visibilité IA est à $1,750 ponctuel, crédité vers l'implémentation si vous continuez. L'implémentation seule va de $2,500 à $6,500 selon la portée. Les programmes standardisés sont à $5,500 pour le sprint de 30 jours et de $12,000 à $18,000 pour le programme de 90 jours. Les contrats mensuels sont à $2,500, $5,000 ou $8,500 par mois. Pour une petite entreprise mono-établissement, il existe des forfaits à prix fixe à partir de $495. Le travail hors périmètre est facturé à $225/h. [Détail complet sur la page tarifs](/pricing/)."

    - question: "Quelle est la différence entre le diagnostic et l'implémentation ?"
      answer: "Le diagnostic est une lecture : où vous en êtes sur les principaux moteurs, ce qui vous bloque, et une feuille de route priorisée, livrée en 10 à 14 jours. L'implémentation, c'est le travail lui-même — robots.txt corrigé, schema validé, réécriture orientée réponse, Google Business Profile et NAP, Bing et IndexNow. La plupart des personnes commencent par le diagnostic et répercutent son coût sur l'implémentation si elles continuent. Vous pouvez aussi passer directement à un programme ou un contrat si vous connaissez déjà la forme du problème."

    - question: "Que comprennent les contrats mensuels ?"
      answer: "Trois niveaux, et la plupart des clients atterrissent au milieu. Foundation ($2,500/mois) assure la maintenance, la surveillance et un rapport mensuel pour une entreprise qui consolide les gains déjà acquis. Growth ($5,000/mois) ajoute la mise à jour du schema, un rythme de contenu, la construction de citations et un suivi mensuel de la visibilité IA. Concierge ($8,500/mois) est un service complet SEO + AEO + GEO avec reporting propriétaire, actions earned media et stratégie trimestrielle — pour les entreprises qui traitent la visibilité IA comme un vrai canal. [Comparez-les sur la page tarifs](/pricing/#retainers)."

    - question: "Combien de temps avant de voir des résultats ?"
      answer: "Les premiers changements apparaissent en environ 30 jours ; l'état stable s'installe vers le sixième mois. Le premier mois ressemble souvent à une perte nette, parce que nous corrigeons des problèmes de fond — des années de fiches non revendiquées, de schema manquant, de robots bloqués — qui auraient dû être traités bien avant. Au douzième mois, le ROI se compose. Quiconque promet plus vite ment ou enfreint les règles de Google."

    - question: "Pouvez-vous garantir un classement n°1 ou une citation ChatGPT ?"
      answer: "Non, et voici pourquoi. Les pipelines de récupération augmentés reclassent de façon probabiliste, et une seule mise à jour de modèle peut remplacer une grande part des sources précédemment citées du jour au lendemain — le déploiement de Gemini 3 a fait exactement cela début 2026. Ce que nous garantissons à la place, c'est un travail transparent : chaque mois vous voyez ce que nous avons fait, vous conservez l'accès complet à vos comptes, et vous pouvez partir à tout moment. Garantir un placement dans une réponse IA est une promesse que personne ne peut tenir."

    - question: "Travaillez-vous uniquement avec des entreprises de St. Louis ?"
      answer: "Non. Gateway est basé à St. Louis, Missouri, et travaille avec des clients B2B partout aux États-Unis, à distance. Les entreprises de services locaux avec une géographie précise voient généralement les résultats les plus rapides, car les moteurs de réponse pondèrent fortement l'intention locale et le champ est mince — mais le même travail rend une entreprise à vente nationale citable aussi. Votre emplacement importe moins que la capacité des moteurs à vous lire et à vous faire confiance."

    - question: "Quel est votre lien avec Jamison Software Solutions ?"
      answer: "Deux SARL, un seul fondateur. Jamison Software Solutions construit et possède les sites web des clients ; Gateway Tech AEO fait le travail de visibilité en recherche — pour les clients JSS en marque blanche, ou directement pour des entreprises qui ont déjà un site dont elles sont satisfaites. Ce sont des entités juridiques distinctes qui se référencent mutuellement comme organisations liées, ce qui est aussi la façon dont nous modélisons le travail d'entité pour tout client gérant plusieurs marques."

    - question: "Et si j'ai déjà quelqu'un qui s'occupe du SEO ?"
      answer: "L'AEO et le SEO se recoupent, donc un bon travail SEO facilite l'AEO. Nous nous coordonnons avec une équipe SEO existante plutôt que de la remplacer. Commencez par le diagnostic : il identifie précisément quels écarts AEO combler sans refaire ce qui fonctionne déjà. De nombreux clients maintiennent les deux."

    - question: "Et si je n'ai même pas de site web ?"
      answer: "Vous pouvez être cité sans site web. Les moteurs tirent leurs informations de Google Business Profile, Yelp, Foursquare et Apple Business Connect, nous revendiquons et complétons donc ces fiches en premier. Quand un site devient pertinent, nous le construisons nativement AEO — schema d'abord, réponse d'abord, Bing et IndexNow câblés dès le lancement — plutôt que de rétrofit plus tard. Votre site est l'actif que vous contrôlez entièrement ; les fiches sont la fondation que les moteurs trouvent en premier."

    - question: "Qu'en est-il de mon Google Business Profile ?"
      answer: "Pour une entreprise locale, c'est le levier au plus haut ROI qui soit. Un profil complet peut vous faire entrer dans le local 3-pack en 30 à 60 jours sans autre changement. Si le vôtre est non revendiqué, à moitié vide ou sans photos, c'est là que commence le travail. Le <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>rapport Whitespark 2026 Local Search Ranking Factors</a> classe toujours le GBP n°1 pour la visibilité dans le local pack."

    - question: "Et si je veux arrêter ?"
      answer: "Arrêtez. Vous êtes propriétaire de tout — votre domaine, votre GBP, vos comptes, votre contenu — et il n'y a aucun contrat plus long que le mois en mois. Si le travail ne paie pas, partez ; nous préférons le savoir plutôt que vous retenir. Verrouiller les clients est un signe que le travail ne peut pas les garder sur le mérite."

    - question: "« AEO » est-il identique à Answer Engine Optimization ?"
      answer: "Oui. AEO et Generative Engine Optimization (GEO) désignent la même chose ; le secteur n'a pas encore arrêté un seul terme. (Note : AEO est aussi le symbole boursier d'American Eagle Outfitters, mais la classe de marque est différente — prêt-à-porter contre services marketing — donc aucun conflit.)"

    - question: "Puis-je le faire moi-même ?"
      answer: "En partie, oui. Les forfaits à prix fixe sont conçus pour cela : un AI Visibility Quick Check ($495) vous indique où vous en êtes et les trois choses à corriger en premier, et un Schema Pack ($895) vous remet un schema LocalBusiness, FAQPage et Person validé, généré à partir de vos vraies données. La plupart des propriétaires peuvent traiter les points à fort impact en une après-midi — robots.txt, Bing Webmaster Tools, bases du schema. [Voir les forfaits petites entreprises](/pricing/#flat-packages)."
