trust:
  enable: true
  kicker: "何を、どこに、なぜ示すか"
  title: "ロゴの壁に頼らない信頼。"
  items:
    - title: "ライブ AI 引用リール。"
      description: "ヒーローでの証拠 — セントルイスの一般的な業種カテゴリが 4 つのエンジンで引用される様子をループ表示。回答が勝者を選ぶ瞬間を見せます。"
    - title: "Rails エコシステムの信頼性。"
      description: "Ruby on Rails 開発者。同フレームワークは Shopify を支えています(5.5M+ 加盟店、モノリスで毎秒約 19M の MySQL クエリ)。194+ のマージ済プルリクエストは GitHub で検証可能。"
    - title: "オペレーターの透明性。"
      description: "公開価格。公開クライアント上限。公開メソッド。代理店オーバーヘッドなし。手法を見るのに NDA は不要。"
    - title: "地元との連携。"
      description: "メンバーシップ確定後、フッターにセントルイス商工会議所と地域組織のロゴを掲示。各 CTA の近くに物理的な都市タグを表示。"
    - title: "開発者への直通連絡。"
      description: "メールとカレンダー — プロジェクトマネージャーもボットも介さない。レスポンスタイムを暗黙ではなく明示。"
