{{ define "main" }}

{{ partial "navigation.html" . }}

<section class="section about-page">
  <div class="container">
    {{ partial "breadcrumb.html" . }}
    <article class="about-page-article">
      <header class="about-page-header">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}<p class="about-page-lead">{{ . }}</p>{{ end }}
        <p class="about-page-meta">
          {{ i18n "updated_label" | default "Updated" }}
          <time datetime="{{ .Lastmod.Format "2006-01-02" }}">{{ .Lastmod.Format "January 2, 2006" }}</time>
        </p>
      </header>
      <div class="about-page-body">
        {{ .Content }}
      </div>
      {{ partial "author-bio.html" . }}
    </article>
  </div>
</section>

{{ end }}
