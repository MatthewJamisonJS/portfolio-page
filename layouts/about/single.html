{{ define "main" }}
<div class="page-about">
  <article class="container">
    <header class="page-header">
      <h1>{{ .Title }}</h1>
      <div class="article-meta">
        <span>By <a href="/about/">{{ .Params.author | default "Matthew Jamison" }}</a></span>
        {{ with .Date }} · <time datetime="{{ .Format "2006-01-02" }}">Published {{ .Format "January 2, 2006" }}</time>{{ end }}
        {{ if and .Lastmod (ne .Lastmod .Date) }} · <time datetime="{{ .Lastmod.Format "2006-01-02" }}">Updated {{ .Lastmod.Format "January 2, 2006" }}</time>{{ end }}
      </div>
    </header>
    <div class="about-body">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
