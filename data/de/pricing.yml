pricing:
  enable: true
  title: "Drei ehrliche Stufen"
  pick_label: "So wählen Sie"
  pick_text: "Wenn Sie Zeit haben und es lernen wollen — Audit. Wenn Sie wollen, dass es richtig gebaut wird, aber Sie es danach selbst betreiben — Setup und Übergabe. Wenn Sie es verwaltet wissen wollen und nicht darüber nachdenken müssen — Done-For-You."
  footnote: "Der Audit wird auf Setup angerechnet, wenn Sie weitermachen. Keine langen Verträge. Wir begrenzen das erste Jahr auf 5 Kunden im Großraum St. Louis — langsames Wachstum bedeutet tiefer Service."
  tiers:
    - slug: "audit"
      name: "Audit"
      price: "$250"
      cadence: "einmalig"
      # Structured-price fields drive ProfessionalService.offers[].priceSpecification
      # in head.html (audit H7 fix). The visible `price` / `cadence` strings stay for
      # human display in the pricing card; the schema reads from these numeric fields.
      price_min: "250"
      price_max: "250"
      price_currency: "USD"
      price_unit: "one-time"
      highlight: false
      use_when: "Sie sind skeptisch und wollen die Arbeit sehen, bevor Sie sich festlegen. Sie reparieren danach selbst."
      includes:
        - "Vollständiges Sichtbarkeits-Audit"
        - "Priorisierte Mängelliste"
        - "1-stündige Begehung"
        - "Sie setzen es um"
      cta_label: "Mit einem Audit starten"
      cta_link: "?service=audit#contact"
    - slug: "setup"
      name: "Setup und Übergabe"
      price: "$700"
      cadence: "einmalig"
      price_min: "700"
      price_max: "700"
      price_currency: "USD"
      price_unit: "one-time"
      highlight: true
      use_when: "Sie wollen, dass es richtig gebaut wird, und betreiben es nach einer Schulungssitzung selbst."
      includes:
        - "Alles aus Audit"
        - "Umsetzung erfolgt"
        - "Schulungssitzung"
        - "Sie betreiben es danach"
      cta_label: "Setup und Übergabe wählen"
      cta_link: "?service=setup#contact"
    - slug: "dfy"
      name: "Done-For-You"
      price: "$500–1,200"
      cadence: "pro Monat"
      price_min: "500"
      price_max: "1200"
      price_currency: "USD"
      price_unit: "per month"
      highlight: false
      use_when: "Sie haben Budget, aber keine Zeit. Sie wollen, dass es Ende-zu-Ende verwaltet wird."
      includes:
        - "Alles aus Setup"
        - "Monatliche Optimierung"
        - "Inhalte und Bewertungen"
        - "Reporting + Strategie"
      cta_label: "Über einen Retainer sprechen"
      cta_link: "?service=dfy#contact"
  # Schema-only Offer; mirrored from data/en/pricing.yml.
  # Consumed by ProfessionalService.offers in head.html. Audit H6 reframe.
  intake:
    enable: true
    name: "Projekt-Brief-Eingang"
    description: "E-Mail-erste Aufnahme. Erste Antwort innerhalb von 48 bis 96 Stunden."
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "Kostenlose Beratung"
