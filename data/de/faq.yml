faq:
  enable: true
  title: "Häufige Fragen"
  items:
    - question: "Was ist AEO und worin unterscheidet es sich von SEO?"
      answer: "AEO (Answer Engine Optimization) strukturiert Ihre Website so, dass KI-Tools Sie zitieren, wenn jemand fragt: ChatGPT, Perplexity, Google AI Overviews, Claude. SEO zielt auf die zehn blauen Links; AEO zielt auf die zitierte Antwort. Gleiches Fundament (Schema, Seitengeschwindigkeit, Inhaltsqualität), anderes Ziel. SEO baut Auffindbarkeit; AEO baut Autorität, die eine KI zitieren kann. [Warum das jetzt wichtig ist](/why/)."

    - question: "Was sind robots.txt und Schema-Markup — und warum sind sie für AEO entscheidend?"
      answer: "Zwei Dateien erledigen den Großteil der Arbeit. Ihre <a href='https://developers.google.com/search/docs/crawling-indexing/robots/intro' rel='external nofollow'>robots.txt</a> teilt den KI-Crawlern mit, ob sie Ihre Website lesen dürfen — 2026 ist das eine geteilte Entscheidung: Die Antwort-Crawler (OAI-SearchBot, Claude-SearchBot, PerplexityBot) lohnt es namentlich zu erlauben; die Trainings-Crawler (GPTBot, ClaudeBot) sind eine separate Frage. Ihr <a href='https://schema.org/' rel='external nofollow'>Schema-Markup</a> kennzeichnet jede Seite mit strukturierten Daten (Öffnungszeiten, Preise, FAQs, Adresse), damit KI weiß, was Sie tun. Die meisten blockieren die Antwort-Crawler versehentlich und liefern null Schema. Beides beheben — und Sie wechseln von unsichtbar zu lesbar."

    - question: "Ersetzt KI-Suche tatsächlich Google?"
      answer: "<a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner prognostizierte einen Rückgang des traditionellen Suchvolumens um 25 % bis 2026</a>, und <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe meldete einen Anstieg des KI-Traffics auf US-Einzelhandelsseiten um 393 % im Jahresvergleich im ersten Quartal 2026</a>. Suche verschwindet nicht; KI gewinnt Marktanteile. Die Kunden, die einen Assistenten um eine Empfehlung bitten, sind real — und ihr Anteil wächst weiter."

    - question: "Was kostet das?"
      answer: "Es hängt davon ab, ob Sie eine Analyse oder die eigentliche Arbeit kaufen. Die AEO / KI-Sichtbarkeits-Diagnose kostet $1.750 einmalig und wird auf die Implementierung angerechnet, wenn Sie fortfahren. Einzelne Implementierungen laufen je nach Umfang von $2.500 bis $6.500. Fertige Programme kosten $5.500 für den 30-Tages-Sprint und $12.000–$18.000 für das 90-Tages-Programm. Für ein Einzelstandort-Kleinunternehmen gibt es Festpreispakete ab $495. [Vollständige Aufstellung auf der Preisseite](/pricing/)."

    - question: "Was ist der Unterschied zwischen Diagnose und Implementierung?"
      answer: "Die Diagnose ist eine Analyse: Wo Sie bei den wichtigsten KI-Tools stehen, was Sie blockiert und ein priorisierter Fahrplan — geliefert in 10–14 Tagen. Die Implementierung ist die eigentliche Arbeit — korrigierte robots.txt, validiertes Schema, antwortorientierte Überarbeitungen, Google Business Profile und NAP, Bing und IndexNow. Die meisten beginnen mit der Diagnose und rechnen deren Kosten auf die Implementierung an, wenn sie fortfahren. Sie können auch direkt in ein Programm einsteigen, wenn Sie das Problem bereits kennen."

    - question: "Wie lange dauert es bis zu Ergebnissen?"
      answer: "Erste Veränderungen zeigen sich nach etwa 30 Tagen; stabiler Zustand erreicht rund Monat sechs. Monat eins sieht oft nach einem Nettoverlust aus, weil wir grundlegende Probleme beheben — jahrelange nicht beanspruchte Einträge, fehlendes Schema, blockierte Crawler — die längst hätten erledigt sein sollen. Bis Monat zwölf verstärkt sich der ROI. Wer Schnelleres verspricht, lügt oder bricht Googles Regeln."

    - question: "Können Sie Platz 1 oder ein ChatGPT-Zitat garantieren?"
      answer: "Nein — und wir erklären warum. Retrieval-Pipelines re-ranken probabilistisch, und ein einziges Modell-Update kann über Nacht einen großen Teil zuvor zitierter Quellen ersetzen — der Rollout von Gemini 3 Anfang 2026 hat genau das getan. Was wir stattdessen garantieren, ist transparente Arbeit: Während des gesamten Engagements sehen Sie, was wir getan haben, Sie behalten vollen Zugriff auf Ihre Konten und können jederzeit aufhören. Eine Platzierungsgarantie in einer KI-Antwort ist ein Versprechen, das niemand halten kann."

    - question: "Arbeiten Sie nur mit Unternehmen in St. Louis?"
      answer: "Nein. Gateway hat seinen Sitz in St. Louis, Missouri, und arbeitet mit B2B-Kunden bundesweit, remote. Lokale Dienstleister mit engem Einzugsgebiet sehen die schnellsten Fortschritte, weil Antwort-KIs lokale Absichten stark gewichten und das Wettbewerbsfeld dünn ist — aber dieselbe Arbeit macht auch ein national verkaufendes Unternehmen zitierfähig. Wo Sie sind, spielt eine geringere Rolle als die Frage, ob KI Sie lesen und Ihnen vertrauen kann."

    - question: "Was ist Ihre Beziehung zu Jamison Software Solutions?"
      answer: "Zwei GmbHs, ein Gründer. Jamison Software Solutions baut und betreut Kundenwebsites; Gateway Tech AEO macht die Suchsichtbarkeitsarbeit — für JSS-Kunden auf White-Label-Basis oder direkt für Unternehmen, die bereits eine Website haben, mit der sie zufrieden sind. Beides sind eigenständige Rechtspersonen, die sich gegenseitig als verbundene Organisationen referenzieren — was auch der Art entspricht, wie wir die Entity-Arbeit für jeden Kunden modellieren, der mehr als eine Marke betreibt."

    - question: "Was, wenn ich bereits eine SEO-Person habe?"
      answer: "AEO und SEO überschneiden sich — gute SEO-Arbeit erleichtert AEO. Wir koordinieren mit einem bestehenden SEO-Team, anstatt es zu ersetzen. Beginnen Sie mit der Diagnose: Sie zeigt, welche AEO-Lücken zu schließen sind, ohne zu wiederholen, was bereits funktioniert. Viele Kunden behalten beides."

    - question: "Was, wenn ich noch keine Website habe?"
      answer: "Sie können auch ohne Website zitiert werden. KI-Tools beziehen Daten aus Google Business Profile, Yelp, Foursquare und Apple Business Connect — wir beanspruchen und vervollständigen diese zuerst. Wenn eine Website sinnvoll ist, bauen wir sie AEO-nativ — Schema zuerst, Antwort zuerst, Bing und IndexNow von Anfang an eingebunden — statt sie später umzurüsten. Ihre Website ist das einzige Asset, das Sie vollständig kontrollieren; die Einträge sind das Fundament, das KI zuerst findet."

    - question: "Was ist mit meinem Google Business Profile?"
      answer: "Für ein lokales Unternehmen ist es der Hebel mit dem höchsten ROI. Ein vollständiges Profil kann Sie in 30–60 Tagen ins lokale 3-Pack bringen, ohne dass sich sonst etwas ändert. Ist Ihres nicht beansprucht, halb leer oder ohne Fotos, beginnt die Arbeit dort. Der <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>Whitespark 2026 Local Search Ranking Factors Report</a> setzt GBP nach wie vor auf Platz 1 für die Sichtbarkeit im Local Pack."

    - question: "Was, wenn ich aufhören will?"
      answer: "Engagements haben einen festen Umfang, es gibt also nichts zu kündigen — Sie besitzen alles (Ihre Domain, Ihr GBP, Ihre Konten, Ihre Inhalte) und entscheiden Phase für Phase, ob es weitergeht. Wenn sich die Arbeit nicht auszahlt, gehen Sie; wir wüssten es lieber, als Sie festzuhalten. Kunden festzuhalten ist ein Zeichen dafür, dass die Arbeit nicht gut genug ist, um sie freiwillig zu halten."

    - question: "Ist 'AEO' dasselbe wie Answer Engine Optimization?"
      answer: "Ja. AEO und Generative Engine Optimization (GEO) bezeichnen dasselbe; die Branche hat sich noch nicht auf einen Begriff geeinigt. (Hinweis: AEO ist auch das Börsenkürzel von American Eagle Outfitters — aber die Markenklasse ist eine andere: Bekleidungseinzelhandel versus Marketing-Dienstleistungen. Kein Konflikt.)"

    - question: "Kann ich das selbst machen?"
      answer: "Teils ja. Die Festpreispakete sind genau dafür gemacht: Ein AI Visibility Quick Check ($495) zeigt Ihnen, wo Sie stehen und was die drei vordringlichsten Korrekturen sind, und ein Schema-Paket ($895) liefert validiertes LocalBusiness-, FAQPage- und Person-Schema aus Ihren echten Daten. Die meisten Inhaber können die wirkungsvollen Punkte an einem Nachmittag erledigen — robots.txt, Bing Webmaster Tools, Schema-Grundlagen. [Kleinunternehmen-Pakete ansehen](/pricing/#flat-packages)."
