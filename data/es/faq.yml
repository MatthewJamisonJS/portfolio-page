faq:
  enable: true
  title: "Preguntas frecuentes"
  items:
    - question: "¿Qué es AEO y en qué se diferencia del SEO?"
      answer: "AEO (Answer Engine Optimization) estructura tu sitio para que las herramientas de IA te citen cuando alguien pregunta: ChatGPT, Perplexity, Google AI Overviews, Claude. El SEO apunta a los diez enlaces azules; el AEO apunta a la respuesta citada. Misma base técnica (schema, velocidad de página, calidad del contenido), objetivo diferente. El SEO construye visibilidad; el AEO construye autoridad que un motor puede citar. [Consulta por qué esto importa ahora](/why/)."

    - question: "¿Qué son robots.txt y el marcado schema, y por qué importan para AEO?"
      answer: "Dos archivos hacen casi todo el trabajo. Tu <a href='https://developers.google.com/search/docs/crawling-indexing/robots/intro' rel='external nofollow'>robots.txt</a> le dice a los crawlers de IA si pueden leer tu sitio. En 2026 conviene permitir por nombre los de búsqueda que alimentan respuestas (OAI-SearchBot, Claude-SearchBot, PerplexityBot); los de entrenamiento (GPTBot, ClaudeBot) son decisión aparte. Tu <a href='https://schema.org/' rel='external nofollow'>marcado schema</a> etiqueta cada página con datos estructurados (horarios, precios, FAQs, dirección) para que los motores sepan qué haces. La mayoría bloquea los crawlers por accidente y envía cero schema. Arregla ambos y pasas de invisible a legible."

    - question: "¿La búsqueda con IA está reemplazando realmente a Google?"
      answer: "<a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner pronosticó una caída del volumen de búsqueda tradicional del 25 % para 2026</a>, y <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe reportó un aumento del 393 % interanual en el tráfico de IA a sitios minoristas de EE. UU. en el T1 2026</a>. La búsqueda no desaparece; la IA está ganando cuota. Los clientes que le piden una recomendación a un asistente son reales, y esa cuota sigue creciendo."

    - question: "¿Cuánto cuesta esto?"
      answer: "Depende de si compras un análisis o el trabajo en sí. El Diagnóstico de Visibilidad AEO / IA cuesta $1,750 una sola vez, acreditado a la implementación si continúas. La implementación independiente oscila entre $2,500–$6,500 según el alcance. Los programas productizados cuestan $5,500 para el sprint de 30 días y entre $12,000–$18,000 para el programa de 90 días. Para un pequeño negocio de una sola ubicación existen paquetes a precio fijo desde $495. [Desglose completo en la página de precios](/pricing/)."

    - question: "¿Cuál es la diferencia entre el diagnóstico y la implementación?"
      answer: "El diagnóstico es un análisis: dónde estás en los principales motores, qué te está bloqueando y una hoja de ruta priorizada, entregada en 10–14 días. La implementación es el trabajo en sí — robots.txt corregido, schema validado, reescrituras con respuesta-primero, Google Business Profile y NAP, Bing e IndexNow. La mayoría empieza con el diagnóstico y lo acredita a la implementación si continúa. También puedes ir directamente a un programa si ya conoces la forma del problema."

    - question: "¿Cuánto tarda en verse resultados?"
      answer: "Los primeros cambios se ven en unos 30 días; el estado estable llega alrededor del sexto mes. El primer mes a menudo parece una pérdida neta, porque estamos arreglando problemas de base — años de fichas sin reclamar, schema ausente, crawlers bloqueados — que deberían haberse resuelto hace mucho. Para el mes doce el ROI se compone. Quien promete más rápido miente o infringe las normas de Google."

    - question: "¿Pueden garantizar el puesto #1 o una cita en ChatGPT?"
      answer: "No, y explicamos por qué. Las tuberías de recuperación aumentada reclasifican de forma probabilística, y una sola actualización de modelo puede reemplazar muchas de las fuentes citadas de un día para otro — el lanzamiento de Gemini 3 hizo exactamente eso a principios de 2026. Lo que sí garantizamos es trabajo transparente: ves qué hicimos, conservas acceso completo a tus cuentas y puedes irte cuando quieras. Garantizar la aparición en una respuesta de IA es una promesa que nadie puede cumplir."

    - question: "¿Solo trabajáis con negocios de St. Louis?"
      answer: "No. Gateway tiene sede en St. Louis, Missouri, y trabaja con clientes B2B a nivel nacional, en remoto. Los negocios de servicios locales con geografía ajustada suelen ver los movimientos más rápidos, porque los motores de respuesta ponderan mucho la intención local y el campo es reducido — pero el mismo trabajo hace que una empresa que vende a nivel nacional sea citable. Donde estés importa menos que si los motores pueden leer y confiar en ti."

    - question: "¿Cuál es tu relación con Jamison Software Solutions?"
      answer: "Dos SLCs, un fundador. Jamison Software Solutions construye y gestiona sitios web de clientes; Gateway Tech AEO hace el trabajo de visibilidad en búsqueda — para clientes de JSS en modalidad white-label, o directamente para negocios que ya tienen un sitio con el que están satisfechos. Son entidades legales distintas que se referencian mutuamente como organizaciones relacionadas, que es también cómo modelamos el trabajo de entidad para cualquier cliente que gestione más de una marca."

    - question: "¿Y si ya tengo a alguien encargado del SEO?"
      answer: "AEO y SEO se solapan, así que un buen trabajo de SEO facilita el AEO. Nos coordinamos con el equipo de SEO existente en lugar de reemplazarlo. Empieza con el diagnóstico: identifica qué brechas de AEO hay que cerrar sin rehacer lo que ya funciona. Muchos clientes mantienen ambos."

    - question: "¿Y si ni siquiera tengo sitio web?"
      answer: "Puedes ser citado sin uno. Los motores extraen información de Google Business Profile, Yelp, Foursquare y Apple Business Connect, así que reclamamos y completamos esos primero. Cuando un sitio tiene sentido, lo construimos AEO-nativo — schema primero, respuesta primero, Bing e IndexNow conectados desde el lanzamiento — en lugar de adaptarlo después. Tu sitio es el único activo que controlas completamente; los listados son la base que los motores encuentran primero."

    - question: "¿Qué pasa con mi Google Business Profile?"
      answer: "Para un negocio local es la palanca de mayor ROI que existe. Un perfil completo puede situarte en el local 3-pack en 30–60 días sin cambiar nada más. Si el tuyo no está reclamado, está a medias o le faltan fotos, por ahí empieza el trabajo. El <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>informe Whitespark 2026 Local Search Ranking Factors</a> sigue colocando GBP en el #1 para visibilidad en el local pack."

    - question: "¿Y si quiero parar?"
      answer: "Los compromisos son de alcance fijo, así que no hay nada que cancelar — tú eres dueño de todo (tu dominio, tu GBP, tus cuentas, tu contenido) y decides fase por fase si seguir adelante. Atar a los clientes es una señal de que el trabajo no puede retenerlos por sus propios méritos."

    - question: "¿Es 'AEO' lo mismo que Answer Engine Optimization?"
      answer: "Sí. AEO y Generative Engine Optimization (GEO) apuntan a lo mismo; el sector aún no se ha decantado por un solo término. (Nota: AEO también es el ticker bursátil de American Eagle Outfitters, pero la clase de marca es diferente — ropa minorista frente a servicios de marketing — así que no hay conflicto.)"

    - question: "¿Puedo hacerlo yo mismo?"
      answer: "Parte de ello, sí. Los paquetes a precio fijo están pensados para eso: un AI Visibility Quick Check ($495) te dice dónde estás y las tres cosas que arreglar primero, y un Schema Pack ($895) te entrega schema validado de LocalBusiness, FAQPage y Person generado a partir de tus datos reales. La mayoría de los propietarios puede resolver los puntos de mayor impacto en una tarde — robots.txt, Bing Webmaster Tools, schema básico. [Consulta los paquetes para pequeños negocios](/pricing/#flat-packages)."
