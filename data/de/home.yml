home:
  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "Was ist Answer Engine Optimization?"
      body: |
        AEO ist die Arbeit, die du machst, damit KI-Werkzeuge dich zitieren, wenn ein Kunde fragt. ChatGPT, Perplexity, Google AI Overview, Claude, Apple Intelligence, Bing Copilot. SEO jagt den zehn blauen Links nach; AEO will die zitierte Antwort sein. Gleiches technisches Fundament (Schema, Seitengeschwindigkeit, saubere URLs), anderes Ziel. SEO baut Auffindbarkeit. AEO baut etwas, das die KI zitieren kann.

        Wie Menschen suchen, hat sich verändert. Statt „Klempner in der Nähe" zu tippen und zehn Treffer zu überfliegen, stellen Kunden dem Chat-Assistenten die ganze Frage: „Wer ist der beste Notfall-Klempner im Süden von St. Louis, der früh öffnet?" Sie bekommen einen Satz zurück. Ein, zwei Namen. Manchmal einen Link. Wer nicht in der Antwort steht, dessen restliches Marketing kommt gar nicht erst zum Zug.

    - id: "why-matters-local"
      heading: "Warum das für lokale Unternehmen in St. Louis zählt"
      body: |
        45 % der lokalen Verbraucher fragen die KI nach Geschäftsempfehlungen. Vor einem Jahr lag diese Zahl bei 6 %. Der Übergang von den Gelben Seiten zu Google ging nicht so schnell. Die meisten lokalen Unternehmen in St. Louis sind für diese KI weiterhin unsichtbar: blockierte robots.txt, kein Schema, nicht beanspruchte Einträge. Deine Konkurrenten werden zitiert, wenn die KI nach Klempnern, Steuerberatern, Maklern sucht; du nicht. Die Kunden sind real und der Abstand wächst von Quartal zu Quartal.

    - id: "how-we-work"
      heading: "Wie wir arbeiten"
      body: |
        Drei Säulen leiten jede Entscheidung: **Technik** (kann die KI dich finden?), **Autorität** (vertraut die KI dir?), **Inhalt** (beantwortest du, was sie fragen?). Wir auditieren alle drei, schreiben dir eine priorisierte Korrekturliste und begleiten die Umsetzung. [Lies, was uns unterscheidet.](/different/)

        Wähl die Stufe, die zu deiner Bandbreite passt. Audit, wenn du es lernen und selbst betreiben willst. Setup & Hand-off, wenn du es richtig gebaut haben und danach übernehmen willst. Done-For-You, wenn wir es Ende zu Ende führen sollen. Jedes Engagement beginnt gleich: ein schriftliches Audit, das dir gehört, egal ob du bei uns bleibst oder nicht. Das Audit benennt die konkreten Probleme deiner Seite, ordnet sie nach Wirkung, zeigt die überprüfbaren Belege. Keine Angebote im Bericht-Mantel.

    - id: "who-this-for"
      heading: "Für wen das passt, und für wen nicht"
      body: |
        Funktioniert für Dienstleistungsbetriebe mit engem Einzugsgebiet. Klempner, Elektriker, HLK, Zahnmedizin, Recht, Buchhaltung, Hausreparatur, Immobilien, lokaler Einzelhandel. Je schärfer dein Servicegebiet, desto stärker wirkt AEO: Antwortmaschinen gewichten lokale Absicht hoch und das Konkurrenzfeld schrumpft. Wenn du ein SaaS bist, das national auf Google ranken will, holen klassisches SEO und bezahlte Anzeigen den ROI. Wenn du ein lokales Unternehmen rund um St. Louis bist, ist AEO der Hebel, den fast niemand sonst zieht.

        Wir begrenzen das erste Jahr auf 5 Kunden. Lokale Arbeit braucht Aufmerksamkeit; wer auf eine Liste von 100 will, ist bei uns falsch. Wir bevorzugen Inhaber-Betreiber und kleine Teams. Wir arbeiten nicht mit Filialketten, Lead-Generation-Farmen oder Modellen, die den echten Preis verstecken. Nur ehrliche Unternehmen gewinnen dadurch, leichter gefunden zu werden.

    - id: "day-one-deliverables"
      heading: "Was du am ersten Tag bekommst"
      body: |
        Vier technische Fundamente sind am ersten Tag verdrahtet. Das **Schema-Markup** kennzeichnet dein Unternehmen, Öffnungszeiten, Adresse, Bewertungen und FAQs in dem Format, das KI-Maschinen nativ lesen. **robots.txt** erlaubt GPTBot, ClaudeBot und PerplexityBot ausdrücklich, deine Seite zu durchsuchen (die meisten lokalen Unternehmen blockieren sie aus Versehen). Die **verifizierte Sitemap** listet jede Seite auf, damit die Indexierung vollständig wird. **llms.txt** verweist KI-Werkzeuge auf deine Lizenz, Datenschutzrichtlinien und alle gesperrten Inhalte. Diese vier Dateien brauchen einen Nachmittag. Die meisten lokalen Seiten haben null davon. Genau da liegt die Lücke.

        Nach den vier Dateien richten wir dein Google Business Profil ein, beanspruchen und gleichen deinen Apple Business Connect Eintrag ab, und beheben die NAP-Konsistenz (Name, Adresse, Telefon) in den Verzeichnissen, die KI-Maschinen wirklich lesen. Review-Schema kommt dazu, damit Sterne in die KI-Antworten wandern. Jede Änderung landet in einem Bericht in klarer Sprache, damit du siehst, was getan wurde und warum. Keine Blackbox-Berichte.
      cta_text: "Detaillierte Preise sehen"
      cta_link: "/pricing/"
