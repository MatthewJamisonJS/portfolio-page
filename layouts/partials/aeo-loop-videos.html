{{ $data := index site.Data site.Language.Lang }}
{{ with $data.reel.reel }}
{{ if .enable }}
{{ $loops := where .loops "enabled" true }}
{{ if gt (len $loops) 0 }}
<figure class="aeo-reel" aria-labelledby="aeo-reel-eyebrow">
  {{ with .eyebrow }}
  <p id="aeo-reel-eyebrow" class="aeo-reel-eyebrow">
    <span class="aeo-reel-eyebrow-dot" aria-hidden="true"></span>
    <span>{{ . }}</span>
  </p>
  {{ end }}

  {{ range $loops }}
  <article class="aeo-reel-card" data-loop="{{ .slug }}">
    <header class="aeo-reel-card-head">
      <span class="aeo-reel-engine">{{ .engine | default .slug }}</span>
      <span class="aeo-reel-tag" aria-hidden="true">snapshot</span>
    </header>
    <div class="aeo-reel-frame">
      <img class="aeo-reel-still"
           src="{{ .poster | relURL }}"
           alt="{{ .aria_label }}"
           width="800" height="500"
           loading="lazy"
           decoding="async">
    </div>
  </article>
  {{ end }}

  {{ with .disclaimer }}
  <footer class="aeo-reel-foot">
    <p class="aeo-reel-disclaimer">{{ . }}</p>
  </footer>
  {{ end }}
</figure>
{{ end }}
{{ end }}
{{ end }}
