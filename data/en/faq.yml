faq:
  enable: true
  title: "Common questions"
  items:
    - question: "What is AEO and how is it different from SEO?"
      answer: "AEO (Answer Engine Optimization) structures your site so AI tools quote you when someone asks: ChatGPT, Perplexity, Google AI Overview, Claude. SEO targets the ten blue links; AEO targets the quoted answer. Same scaffolding (schema, page speed, content quality), different goal. SEO builds discoverability. AEO builds authority you can cite. [See why this matters for local businesses](/why/)."

    - question: "What are robots.txt and schema markup, and why do they matter for AEO?"
      answer: "Two free files do most of the work. Your <a href='https://developers.google.com/search/docs/crawling-indexing/robots/intro' rel='external nofollow'>robots.txt</a> tells GPTBot, ClaudeBot, and PerplexityBot whether they can read your site. Your <a href='https://schema.org/' rel='external nofollow'>schema markup</a> tags each page with structured data (hours, prices, FAQs, address) so AI engines know what you sell. Most local sites block AI crawlers and ship zero schema. Fix both and you go from invisible to discoverable."

    - question: "Is AI search really replacing Google?"
      answer: "<a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner forecasts traditional search volume will drop 25% by 2026</a>. <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe reported AI traffic to U.S. retail sites grew 393% year-over-year in Q1 2026</a>. Search isn't disappearing; AI is taking share. Customers asking ChatGPT for local recommendations are real, and the share keeps growing."

    - question: "How much does AEO cost?"
      answer: "Three tiers: Audit $250 one-time, Setup $700 one-time, Done-For-You $500–$1,200 per month. No hidden pricing. Same rate for every prospect. [See detailed pricing and what's included at each tier](/pricing/). Pick the tier by what you need: learn it yourself, run it after we hand off, or have us manage it ongoing."

    - question: "How long until I see results?"
      answer: "First changes show in 30 days. Steady-state results around month six. Month one often looks like a net loss because we're fixing foundational problems (years of unclaimed listings, missing schema, blocked crawlers) that should have been fixed long ago. By month twelve the ROI compounds. Anyone promising faster is lying or breaking Google's rules."

    - question: "Why are your prices so much lower than other agencies?"
      answer: "Year one is capped at five St. Louis clients so no agency overhead eats your budget. We run the work ourselves: no project manager, no account exec, no slide deck. Slow growth means deep service per client. If you want us to add your logo to a portfolio of 200 other clients, we're not the fit."

    - question: "Can you guarantee a #1 ranking or a ChatGPT citation?"
      answer: "No. Anyone who does is lying or breaking Google's rules. What we guarantee is transparent work: every month you see exactly what we did, you keep full access to your accounts, you can leave anytime. We aim for realistic ROI (measurable traffic and citations), not position promises."

    - question: "What if I already have an SEO person?"
      answer: "AEO and SEO overlap, so solid SEO work makes AEO easier. We coordinate with existing SEO teams instead of replacing them. Start with the Audit: it pinpoints which AEO gaps need closing without redoing work that already works. Many clients keep both."

    - question: "What if I don't even have a website?"
      answer: "You can get cited by AI without a website. AI engines pull from Google Business Profile, Yelp, Foursquare, and Apple Business Connect. We claim and complete those first; a basic five-page site comes second. Your site is the one asset you fully control, and business listings are the foundation AI finds first."

    - question: "What about my Google Business Profile?"
      answer: "GBP is the highest-ROI lever for local businesses. A complete profile moves a business into the local 3-pack in 30–60 days with nothing else changing. If your profile is unclaimed, half-empty, or photo-less, that's where work starts. The <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>Whitespark 2026 Local Search Ranking Factors Report</a> ranks GBP #1 for local pack visibility."

    - question: "What if I want to stop?"
      answer: "Stop. You own everything: your domain, your GBP, your accounts, your content. No contract longer than month-to-month. If the work isn't paying off, leave. We'd rather know than lock you in. Locking clients in signals the work isn't strong enough to keep them on merit."

    - question: "Is 'AEO' the same as Answer Engine Optimization?"
      answer: "Yes. AEO and Generative Engine Optimization (GEO) mean the same thing; the industry hasn't settled on one term yet. Note: AEO is also American Eagle Outfitters' stock ticker, but the trademark class is different (retail apparel vs. marketing services). No conflict."

    - question: "Can I do this myself with the audit?"
      answer: "Yes. The Audit is built for DIY implementation. You get the prioritized fix list, a 1-hour walkthrough, and you implement at your pace. Most owners fix high-impact items in an afternoon: robots.txt, Bing Webmaster Tools, schema basics. [Check the Audit pricing tier](/pricing/#audit). Audit cost credits toward Setup if you change your mind and want us to take over."
