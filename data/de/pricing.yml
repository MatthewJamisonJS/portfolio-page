pricing:
  enable: true
  title: "Three honest tiers"
  pick_label: "How to pick"
  pick_text: "If you have time and want to learn — Audit. If you want it built right but you'll run it after — Setup & Hand-off. If you want it managed and you don't want to think about it — Done-For-You."
  footnote: "Audit credits toward Setup if you continue. No long contracts. We cap year one at 5 St. Louis clients — slow growth means deep service."
  tiers:
    - slug: "audit"
      name: "Audit"
      price: "$250"
      cadence: "one-time"
      # Structured-price fields drive ProfessionalService.offers[].priceSpecification
      # in head.html (audit H7 fix). The visible `price` / `cadence` strings stay for
      # human display in the pricing card; the schema reads from these numeric fields.
      price_min: "250"
      price_max: "250"
      price_currency: "USD"
      price_unit: "one-time"
      highlight: false
      use_when: "You're skeptical and want to see the work before you commit. You'll fix things yourself afterwards."
      includes:
        - "Full visibility audit"
        - "Prioritized fix list"
        - "1-hour walkthrough"
        - "You implement"
      cta_label: "Start with an audit"
      cta_link: "?service=audit#contact"
    - slug: "setup"
      name: "Setup & Hand-off"
      price: "$700"
      cadence: "one-time"
      price_min: "700"
      price_max: "700"
      price_currency: "USD"
      price_unit: "one-time"
      highlight: true
      use_when: "You want it built right, then you run it after a training session."
      includes:
        - "Everything in Audit"
        - "Implementation done"
        - "Training session"
        - "You run it after"
      cta_label: "Pick Setup & Hand-off"
      cta_link: "?service=setup#contact"
    - slug: "dfy"
      name: "Done-For-You"
      price: "$500–1,200"
      cadence: "per month"
      price_min: "500"
      price_max: "1200"
      price_currency: "USD"
      price_unit: "per month"
      highlight: false
      use_when: "You have a budget but no time. You want it managed end-to-end."
      includes:
        - "Everything in Setup"
        - "Monthly optimization"
        - "Content & reviews"
        - "Reporting + strategy"
      cta_label: "Talk about a retainer"
      cta_link: "?service=dfy#contact"
  # TODO: translate to German. Schema-only Offer; mirrored from data/en/pricing.yml.
  # Consumed by ProfessionalService.offers in head.html. Audit H6 reframe.
  intake:
    enable: true
    name: "Project brief intake"
    description: "Email-first intake. First reply within 48–96 hours."
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "Free consultation"
