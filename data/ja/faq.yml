faq:
  enable: true
  title: "よくある質問"
  items:
    - question: "AEO とは何ですか? SEO とどう違いますか?"
      answer: "AEO(Answer Engine Optimization)は、ChatGPT、Perplexity、Google の AI 概要などの AI ツールが質問に答える際に、あなたのサイトを引用するようにサイト構造を整える実践です。SEO は10件の青いリンクで上位を狙います。AEO は引用される回答そのものになることを狙います。作業領域は重なりますが、目的は異なります。"

    - question: "AI 検索は本当に Google を置き換えていますか?"
      answer: "完全にではありませんが、シェアは急速に変わっています。<a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner は従来型検索の検索量が 2026 年までに 25% 減少すると予測しています</a>。<a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe Digital Insights は、米国小売サイトへの AI 経由のトラフィックが 2026 年第 1 四半期に前年比 393% 増加したと報告しました</a>。AI に推奨を尋ねる顧客は実在し、その割合は増えています。"

    - question: "AEO の費用はいくらですか?"
      answer: "3 つのプラン。Audit(監査)は 250 USD 一回。Setup & Hand-off(導入と引き渡し)は 700 USD 一回。Done-For-You(完全代行)は月額 500〜1,200 USD。価格は隠さず、見込み客ごとに違う料金を提示することもしません。どのプランにするかは、自分で学んで運用したいか、構築だけ任せたいか、運用まで任せたいかによります。"

    - question: "結果はどのくらいで見えますか?"
      answer: "最初の測定可能な変化は約 30 日で。安定的な結果は 6 か月目あたりから。作業は基礎工事のため、初月は本来は事前に直しておくべきだったものを直す段階となり、ネット損失のように見えがちです。12 か月目には複利的に効いてきます。これより速く約束する人は嘘をついているか、ビジネスにペナルティを招く手法を使っています。"

    - question: "なぜ他社より大幅に価格が安いのですか?"
      answer: "理由は 2 つ。初年度はセントルイス都市圏で 5 社限定にしているため、代理店としての間接費を抱えていません。そして実作業を私自身が行うため、プロジェクトマネージャー、アカウントエグゼクティブ、提案資料がありません。緩やかな成長は深いサービスにつながります。200 社のロゴが並ぶポートフォリオが目的なら、私たちは適していません。"

    - question: "1 位や ChatGPT の引用を保証できますか?"
      answer: "いいえ。それを約束する人は、嘘をついているか、Google のルールに違反しています。私たちが保証するのは作業そのものです。毎月、何をしたかを正確に確認でき、アカウントへの完全なアクセスは保持され、いつでも停止できます。狙う成果は現実的な ROI 計算であって、順位の約束ではありません。"

    - question: "すでに SEO 担当者がいる場合は?"
      answer: "AEO と SEO は重なるため、良い SEO 作業は私たちの仕事を楽にします。担当者を置き換えるよりも連携することが多いです。SEO 設定が堅実であれば、Audit が正しい出発点です — 既に機能しているものをやり直さずに、AEO 固有のどのギャップを埋めるべきかを正確に示します。"

    - question: "ウェブサイトすらない場合は?"
      answer: "ウェブサイトがなくても AI に引用されることは可能です。AI エンジンは Google Business Profile、Yelp、Foursquare、Apple Business Connect などから情報を取得します。それらをまず取得・整備し、基本的な 5 ページのサイトはその後です。サイトは自分で完全にコントロールできますが、土台ではなく、ビジネスリスティングこそが土台です。"

    - question: "Google Business Profile はどうなりますか?"
      answer: "GBP は地元ビジネスにとって最も ROI の高いレバーです。完全かつ最適化された GBP は、他に何もしなくても 30〜60 日でローカル 3-pack に押し上げ得ます。プロフィールが未取得、半分しか埋まっていない、写真がないなら、どの依頼もそこから始まります。<a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>Whitespark 2024 調査</a>でも GBP はローカルパックの 1 位要因とされています。"

    - question: "途中でやめたい場合は?"
      answer: "やめてください。私たちが触れるすべての所有権はあなたにあります — ドメイン、GBP、アカウント、コンテンツ。月単位を超える契約はありません。成果が出ていないなら、去るべきですし、率直に言えば私たちもそれを知りたいです。クライアントを縛りつけるのは、自発的に残ってもらうほどの仕事ができていない兆候です。"

    - question: "'AEO' と Answer Engine Optimization は同じものですか?"
      answer: "はい。サイト全体で AEO を略称として使っています。Generative Engine Optimization(GEO)と同じ意味です — 業界はまだ用語を統一していません。注意:'AEO' は American Eagle Outfitters の株式ティッカーでもあります。業界も商標分類も異なります。私たちのサービスはマーケティングサービスのクラスであり、衣料品小売ではありません。"

    - question: "Audit を使って自分でできますか?"
      answer: "はい。Audit プランはまさにそのためにあります。優先順位付けされた修正リストと 1 時間のウォークスルーを受け取り、自分のペースで実装します。robots.txt、Bing Webmaster Tools、基本的な schema など、影響度の高い項目はほとんどの経営者が一日のうちに直せます。後で気が変わった場合、Audit の費用は Setup に充当されます。"
