faq:
  enable: true
  title: "Häufige Fragen"
  items:
    - question: "Was ist AEO und worin unterscheidet es sich von SEO?"
      answer: "AEO (Answer Engine Optimization, Optimierung für Antwort-Engines) ist die Praxis, Ihre Website so zu strukturieren, dass KI-Tools wie ChatGPT, Perplexity und Googles KI-Übersicht Sie zitieren, wenn jemand eine Frage stellt. SEO zielt auf die zehn blauen Links. AEO zielt darauf, die zitierte Antwort zu sein. Die Arbeit überschneidet sich — Schema, Seitengeschwindigkeit, Inhaltsqualität — aber das Ziel ist ein anderes."

    - question: "Ersetzt KI-Suche tatsächlich Google?"
      answer: "Nicht vollständig, aber der Anteil verschiebt sich schnell. <a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner prognostiziert, dass das traditionelle Suchvolumen bis 2026 um 25 % sinkt</a>. <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe Digital Insights meldete, dass der KI-Traffic auf US-Einzelhandelsseiten im 1. Quartal 2026 um 393 % im Jahresvergleich gestiegen ist</a>. Die Kunden, die KI um Empfehlungen bitten, sind real, und ihr Anteil wächst."

    - question: "Was kostet AEO?"
      answer: "Drei Stufen. Audit: 250 USD einmalig. Setup und Übergabe: 700 USD einmalig. Done-For-You: 500 bis 1.200 USD pro Monat. Wir verbergen Preise nicht und machen unterschiedlichen Interessenten keine unterschiedlichen Angebote. Welche Stufe passt, hängt davon ab, ob Sie es lernen, danach selbst betreiben oder es uns überlassen wollen."

    - question: "Wie lange dauert es bis zu Ergebnissen?"
      answer: "Erste messbare Veränderungen in etwa 30 Tagen. Stabile Ergebnisse um den sechsten Monat. Die Arbeit ist Fundamentarbeit — der erste Monat sieht meist nach einem Nettoverlust aus, weil wir Dinge reparieren, die schon vorher hätten in Ordnung sein sollen. Bis zum zwölften Monat verstärkt sich die Kurve. Wer Schnelleres verspricht, lügt oder tut etwas, das Ihr Geschäft bestraft."

    - question: "Warum sind Ihre Preise so viel niedriger als bei anderen Agenturen?"
      answer: "Zwei Gründe. Wir begrenzen das erste Jahr auf 5 Kunden im Großraum St. Louis, also tragen wir keine Agentur-Gemeinkosten. Und wir erledigen die Arbeit selbst — kein Projektmanager, kein Account Executive, keine Präsentation. Langsames Wachstum bedeutet tiefen Service. Wenn Sie ein Logo in einem 200-Kunden-Portfolio wollen, sind wir nicht die Richtigen."

    - question: "Können Sie Platz 1 oder eine ChatGPT-Zitation garantieren?"
      answer: "Nein, und wer es verspricht, lügt oder verstößt gegen Googles Richtlinien. Was wir garantieren, ist die Arbeit selbst: Sie sehen jeden Monat genau, was wir getan haben, behalten vollen Zugriff auf Ihre Konten und können jederzeit aufhören. Das Ziel, das wir anstreben, ist eine realistische ROI-Rechnung, kein Positionsversprechen."

    - question: "Was ist, wenn ich bereits eine SEO-Person habe?"
      answer: "AEO und SEO überschneiden sich, gute SEO-Arbeit erleichtert also unsere. Wir koordinieren oft mit einer bestehenden Person, anstatt sie zu ersetzen. Wenn Ihr SEO-Setup solide ist, ist der Audit der richtige Ausgangspunkt — er zeigt genau, welche AEO-spezifischen Lücken zu schließen sind, ohne das zu wiederholen, was bereits funktioniert."

    - question: "Was ist, wenn ich nicht einmal eine Website habe?"
      answer: "Sie können auch ohne Website von KI zitiert werden. KI-Engines beziehen Daten aus Google Business Profile, Yelp, Foursquare, Apple Business Connect und anderen. Diese beanspruchen und vervollständigen wir zuerst. Eine einfache fünfseitige Website kommt danach. Die Website ist das Element, das Sie vollständig kontrollieren, aber nicht das Fundament — Ihre Brancheneinträge sind es."

    - question: "Was ist mit meinem Google Business Profile?"
      answer: "GBP ist der Hebel mit dem höchsten ROI für lokale Unternehmen. Ein vollständiges GBP kann ein Unternehmen ohne weitere Änderungen in 30–60 Tagen ins lokale 3-Pack heben. Wenn Ihr Profil nicht beansprucht, halb leer oder ohne Fotos ist, beginnt dort jedes Engagement. Die <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>Whitespark-Report 2026</a> setzt GBP auf Platz 1 fürs Local Pack."

    - question: "Was ist, wenn ich aufhören will?"
      answer: "Hören Sie auf. Sie besitzen alles, was wir berühren — Ihre Domain, Ihr GBP, Ihre Konten, Ihre Inhalte. Keine Verträge länger als von Monat zu Monat. Wenn die Arbeit sich nicht auszahlt, sollten Sie gehen, und ehrlich gesagt wollen wir das wissen. Kunden festzuhalten ist ein Zeichen dafür, dass die Arbeit nicht gut genug ist, um sie freiwillig zu halten."

    - question: "Ist 'AEO' dasselbe wie Answer Engine Optimization?"
      answer: "Ja. Wir verwenden AEO seitenweit als Abkürzung. Es ist dasselbe wie Generative Engine Optimization (GEO) — die Branche hat sich noch nicht auf einen Begriff geeinigt. Hinweis: 'AEO' ist auch das Börsenkürzel von American Eagle Outfitters. Andere Branche, andere Markenklasse. Unser Service liegt in der Marketing-Service-Klasse, nicht im Bekleidungseinzelhandel."

    - question: "Kann ich es mit dem Audit selbst machen?"
      answer: "Ja. Die Audit-Stufe ist genau dafür gedacht. Sie erhalten die priorisierte Mängelliste und eine einstündige Begehung und setzen es in Ihrem Tempo um. Die meisten Inhaber können die wirkungsvollen Punkte an einem Nachmittag erledigen — robots.txt, Bing Webmaster Tools, Schema-Grundlagen. Der Audit wird auf das Setup angerechnet, falls Sie es sich später anders überlegen."
