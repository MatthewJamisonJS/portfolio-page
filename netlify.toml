# Netlify Configuration for Matthew Jamison Portfolio
# Optimized for sub-second page loads

[build]
  publish = "public"
  command = "hugo --minify --environment production"

[build.environment]
  HUGO_VERSION = "0.152.2"
  HUGO_ENV = "production"

# Enable aggressive compression
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; media-src 'self'; connect-src 'self' https://cloudflareinsights.com https://csp-report.gatewaytechaeo.com; frame-src 'self'; form-action 'self' https://intake.gatewaytechaeo.com; report-uri https://csp-report.gatewaytechaeo.com/"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Compress text assets
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Encoding = "br, gzip"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Encoding = "br, gzip"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Encoding = "br, gzip"

# Cache images aggressively
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Font caching
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Enable HTTP/2 Server Push for critical resources
[[headers]]
  for = "/"
  [headers.values]
    Link = '''
    </css/style.min.css>; rel=preload; as=style,
    </js/script.min.js>; rel=preload; as=script
    '''
