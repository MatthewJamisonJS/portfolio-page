why:
  enable: true
  title: "Tus clientes le preguntan a la IA sobre negocios como el tuyo."
  subtitle: "La mayoría de los negocios son invisibles para ella."
  intro: "Seis hechos, todos de fuentes públicas que puedes verificar en 30 segundos. Construyen el argumento en orden."
  stats:
    - id: "adoption"
      headline: "El 45 % de los consumidores le pide a la IA recomendaciones de negocios locales — frente al 6 % del año pasado."
      body: "El cambio de escribir una consulta a preguntarle a un chatbot está ocurriendo más rápido que el propio cambio de las Páginas Amarillas a Google."
      source_label: "BrightLocal, Local Consumer Review Survey 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "zero-click"
      headline: "El 93 % de las sesiones de búsqueda con IA terminan sin un solo clic a un sitio web."
      body: "La cita es la conversión. La IA responde, el comprador decide, la visita nunca ocurre. Si no te citan, no estás en la conversación."
      source_label: "Compilación de investigación del sector, 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "citation-share"
      headline: "El 60 % de las citas en AI Overviews va a sitios de terceros. Solo el 40 % cita negocios individuales directamente."
      body: "Compites en dos frentes: que te citen Yelp, Reddit, Quora — y que te citen a ti directamente. Ambos requieren contenido estructurado y legible por máquinas."
      source_label: "Análisis de citas en AI Overview, 2026"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "overlap"
      headline: "AI Overviews aparece en ~48 % de las consultas rastreadas, pero solo el 17 % de las fuentes citadas también posiciona en el top 10 orgánico de Google."
      body: "Posicionarse en la primera página de Google no significa que la IA te cite. AEO es una superficie de visibilidad distinta."
      source_label: "Investigación de Whitespark sobre AI Overviews, 2026"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "search-shift"
      headline: "El 25 % de todo el tráfico de búsqueda se desplaza a la IA antes de que acabe este año."
      body: "La previsión temprana que en 2024 parecía ciencia ficción hoy suena como el calendario."
      source_label: "Previsión de Gartner, febrero de 2024"
      source_url: "https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents"
    - id: "gbp-rank"
      headline: "El Google Business Profile sigue siendo el factor de posicionamiento #1 para resultados locales — tanto en búsqueda con IA como en búsqueda tradicional."
      body: "Si tu perfil no está reclamado, está a medias o le faltan fotos, ese único arreglo supera a cualquier otra cosa que puedas hacer."
      source_label: "Whitespark, 2026 Local Search Ranking Factors"
      source_url: "https://whitespark.ca/local-search-ranking-factors/"
  outro:
    body: "Versión corta: estructuramos tu sitio, tu Google Business Profile y tus listados de terceros para que las herramientas de IA te citen cuando los clientes preguntan. Las herramientas incluyen ChatGPT, Perplexity, Google AI Overview y Claude. [Consulta lo que hacemos realmente](/different/) y cómo auditamos la visibilidad en búsqueda con IA, búsqueda clásica y listados de terceros."
    cta_label: "Consulta lo que hacemos realmente"
    cta_link: "/different/"
