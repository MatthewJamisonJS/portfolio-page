pricing:
  enable: true
  title: "Services et tarifs"
  subtitle: "Aider les entreprises à être trouvées, reconnues et citées par l'IA."
  # Punchy lead above the tabs. Kept short on purpose.
  principle:
    label: "Comment ça fonctionne"
    body: "L'éligibilité d'abord, puis la citabilité."

  # ---------------------------------------------------------------------------
  # PRESENTATION: CSS-only segmented tabs (mirrors jamisonsoftwaresolutions.com
  # /services). `tabs` = the segmented control; each group carries a `tab` and a
  # `display` (feature | cards | rows).
  # Each item shows a 4-word `what` + 4-word `why` + CTA on the page. The longer
  # `scope` is NOT rendered — it feeds ProfessionalService.offers[] in head.html
  # and the ServiceCatalog ItemList (rich, citable detail for answer engines).
  # ---------------------------------------------------------------------------
  tabs:
    - id: "diagnostics"
      label: "Diagnostics et forfaits"
    - id: "build"
      label: "Implémentation et création"
    - id: "programs"
      label: "Programmes et contrats"
    - id: "consulting"
      label: "Conseil et suivi"

  groups:
    - id: "diagnostic"
      tab: "diagnostics"
      display: "feature"
      name: "Par où commencer : le diagnostic AEO / Visibilité IA"
      items:
        - slug: "diagnostic"
          name: "Diagnostic AEO / Visibilité IA"
          price: "$1,750"
          cadence: "ponctuel"
          price_min: "1750"
          price_max: "1750"
          price_currency: "USD"
          price_unit: "one-time"
          highlight: true
          what: "Votre rapport de visibilité IA"
          why: "Voyez ce qui vous bloque"
          scope: "Audit des robots/accès robots (la réalité à trois niveaux des robots 2026, pas « bloquer GPTBot »), vérification Google Business Profile + cohérence NAP, test de visibilité IA sur des requêtes réelles, analyse des avis et de l'autorité, rapport de 10 à 15 pages, appel de 30 minutes et feuille de route priorisée. Livré en 10 à 14 jours. Crédité vers l'implémentation si vous continuez."
          cta_label: "Commencer par un diagnostic"
          cta_link: "/?service=diagnostic#contact"

    - id: "flat-packages"
      tab: "diagnostics"
      display: "cards"
      name: "Forfaits à prix fixe pour petites entreprises"
      items:
        - slug: "quick-check"
          name: "AI Visibility Quick Check"
          price: "$495"
          cadence: "ponctuel"
          price_min: "495"
          price_max: "495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Instantané de visibilité rapide"
          why: "Trois correctifs, classés"
          scope: "Où vous en êtes sur les principaux moteurs, et les trois choses à corriger en premier."
          cta_label: "Obtenir un Quick Check"
          cta_link: "/?service=quick-check#contact"
        - slug: "schema-pack"
          name: "Schema Pack"
          price: "$895"
          cadence: "ponctuel"
          price_min: "895"
          price_max: "895"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Schema validé, fait"
          why: "Les moteurs vous lisent"
          scope: "Schema LocalBusiness + FAQPage + Person, généré à partir de vos vraies données et validé dans Google Rich Results Test."
          cta_label: "Commander le Schema Pack"
          cta_link: "/?service=schema-pack#contact"
        - slug: "audit-lite"
          name: "Audit AEO (lite)"
          price: "$1,495"
          cadence: "ponctuel"
          price_min: "1495"
          price_max: "1495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Diagnostic petite entreprise"
          why: "Focus mono-établissement"
          scope: "Le diagnostic, adapté à une petite entreprise mono-établissement."
          cta_label: "Réserver l'audit lite"
          cta_link: "/?service=audit-lite#contact"

    - id: "implementation"
      tab: "build"
      display: "feature"
      name: "Answer Engine Optimization — implémentation"
      items:
        - slug: "implementation"
          name: "Implémentation AEO"
          price: "$2,500–$6,500"
          cadence: "selon la portée"
          price_min: "2500"
          price_max: "6500"
          price_currency: "USD"
          price_unit: "by scope"
          what: "Nous construisons la fondation"
          why: "Éligible à être cité"
          scope: "Robots.txt corrigé pour la division des robots 2026 (autoriser OAI-SearchBot, Claude-SearchBot, PerplexityBot). Schema LocalBusiness, FAQPage et Person, validé, avec texte schema correspondant au contenu visible. Réécriture orientée réponse — la réponse dès la première phrase. Google Business Profile revendiqué et complété ; un NAP canonique propagé dans les annuaires ingérés par l'IA. Bing Webmaster Tools, soumission sitemap et IndexNow."
          cta_label: "Définir une implémentation"
          cta_link: "/?service=implementation#contact"

    - id: "website-build"
      tab: "build"
      display: "feature"
      name: "Création de site AEO-natif"
      items:
        - slug: "build"
          name: "Création de site AEO-natif"
          price: "$6,000–$15,000"
          cadence: "selon la portée"
          price_min: "6000"
          price_max: "15000"
          price_currency: "USD"
          price_unit: "by scope"
          what: "Nouveau site prêt à être cité"
          why: "Conçu pour être cité"
          scope: "Architecture schema-first, cohérence des entités intégrée, contenu orienté réponse, Bing et IndexNow câblés dès le lancement. Livré conjointement avec Jamison Software Solutions, LLC."
          cta_label: "Définir une création"
          cta_link: "/?service=build#contact"

    - id: "programs"
      tab: "programs"
      display: "cards"
      name: "Programmes standardisés"
      items:
        - slug: "sprint"
          name: "Sprint fondation 30 jours"
          price: "$5,500"
          cadence: "programme 30 jours"
          price_min: "5500"
          price_max: "5500"
          price_currency: "USD"
          price_unit: "30-day program"
          what: "Éligibilité en 30 jours"
          why: "Fondation verrouillée vite"
          scope: "Accès robots, schema, réécriture orientée réponse, GBP + annuaires, Bing + IndexNow. Éligibilité, verrouillée en 30 jours."
          cta_label: "Réserver le sprint"
          cta_link: "/?service=sprint#contact"
        - slug: "program"
          name: "Programme Visibilité IA 90 jours"
          price: "$12,000–$18,000"
          cadence: "programme 90 jours"
          price_min: "12000"
          price_max: "18000"
          price_currency: "USD"
          price_unit: "90-day program"
          highlight: true
          what: "De l'éligibilité à la citabilité"
          why: "Être nommé par les moteurs"
          scope: "Le sprint, plus un rythme de contenu, la construction de citations et les bases des earned media. De l'éligibilité aux premières citations."
          cta_label: "Planifier le programme"
          cta_link: "/?service=program#contact"

    - id: "retainers"
      tab: "programs"
      display: "cards"
      name: "Contrats mensuels"
      items:
        - slug: "foundation"
          name: "Foundation"
          price: "$2,500"
          cadence: "par mois"
          price_min: "2500"
          price_max: "2500"
          price_currency: "USD"
          price_unit: "per month"
          what: "Maintenir et surveiller"
          why: "Consolider vos acquis"
          scope: "Maintenance, surveillance, rapport mensuel — pour une entreprise qui consolide les gains déjà acquis."
          cta_label: "Tenir la ligne"
          cta_link: "/?service=foundation#contact"
        - slug: "growth"
          name: "Growth"
          price: "$5,000"
          cadence: "par mois"
          price_min: "5000"
          price_max: "5000"
          price_currency: "USD"
          price_unit: "per month"
          highlight: true
          what: "Contenu et citations"
          why: "Continuer à gagner en visibilité"
          scope: "Mise à jour du schema, rythme de contenu, construction de citations, suivi et reporting mensuel de la visibilité IA."
          cta_label: "Choisir Growth"
          cta_link: "/?service=growth#contact"
        - slug: "concierge"
          name: "Concierge"
          price: "$8,500"
          cadence: "par mois"
          price_min: "8500"
          price_max: "8500"
          price_currency: "USD"
          price_unit: "per month"
          what: "Service complet, tous canaux"
          why: "Visibilité IA, prise en charge"
          scope: "SEO + AEO + GEO complet, reporting mensuel propriétaire, actions earned media, stratégie trimestrielle."
          cta_label: "Parler de Concierge"
          cta_link: "/?service=concierge#contact"

    - id: "consulting"
      tab: "consulting"
      display: "rows"
      name: "Optimisation de la recherche IA — conseil multi-moteurs"
      items:
        - slug: "consulting"
          name: "Conseil en Visibilité IA"
          price: "Programme ou contrat"
          cadence: "pas à la carte"
          price_on_request: true
          what: "Stratégie multi-moteurs"
          why: "Chaque moteur, un plan"
          scope: "Consolidation des entités sur le web, stratégie de mentions de marque (les mentions corrèlent avec la visibilité IA bien plus fortement que les backlinks), présence sur les plateformes d'avis que les moteurs lisent vraiment, et mesure qui vous indique si vous progressez ou reculez. Livré via un programme ou un contrat."
          cta_label: "Discuter d'un programme"
          cta_link: "/?service=consulting#contact"

    - id: "tracking"
      tab: "consulting"
      display: "rows"
      name: "Suivi géré de la visibilité IA"
      items:
        - slug: "tracking"
          name: "Suivi géré"
          price: "$150–$500"
          cadence: "par mois"
          price_min: "150"
          price_max: "500"
          price_currency: "USD"
          price_unit: "per month"
          what: "Nous surveillons les tableaux de bord"
          why: "Savoir ce qui a changé"
          scope: "Mise en place des outils, surveillance continue et lecture mensuelle en langage clair de ce qui a bougé et pourquoi. Abonnement aux outils de suivi facturé séparément au coût."
          cta_label: "Configurer le suivi"
          cta_link: "/?service=tracking#contact"

  # Ad-hoc hourly — footer addons row + its own Offer (UnitPriceSpecification,
  # HUR) in head.html.
  ad_hoc:
    enable: true
    heading: "Travaux ponctuels et hors périmètre"
    label: "Travaux hors périmètre, pour tous les services"
    rate: "$225"
    unit: "/ heure"
    price: "225"
    price_currency: "USD"
    cta_label: "Demander un travail ponctuel"
    cta_link: "/?service=ad-hoc#contact"

  # Anti-guarantee posture (footer callout). Load-bearing honesty, not a disclaimer.
  wont_promise:
    label: "Ce que nous ne promettons pas"
    body: "Aucune citation garantie. Une seule mise à jour de modèle peut remplacer des sources citées du jour au lendemain. Nous implémentons ce que les preuves soutiennent et rendons compte honnêtement des résultats."

  # Industries declined (footer callout).
  declined:
    label: "Secteurs que nous déclinons"
    items:
      - "Cryptomonnaie ou NFT"
      - "MLM ou structures pyramidales"
      - "Contenu adulte"
      - "Ventes d'armes à feu"
      - "Entreprises sous action réglementaire en cours"

  footnote: "Le diagnostic est crédité vers l'implémentation. Contrats mois par mois. St. Louis, MO — partout aux États-Unis, à distance."

  # Schema-only Offer for free email intake. Consumed by ProfessionalService.offers
  # in head.html; not rendered in the catalog.
  intake:
    enable: true
    name: "Réception de brief de projet"
    description: "Prise de contact par e-mail. Première réponse sous 48 à 96 heures."
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "Consultation gratuite"
