pricing:
  enable: true
  title: "Servicios y precios"
  subtitle: "Hacemos que los negocios sean encontrados, confiables y citados por la IA."
  # Encabezado conciso sobre las pestañas. Breve a propósito.
  principle:
    label: "Cómo funciona"
    body: "Elegibilidad primero, luego citabilidad."

  # ---------------------------------------------------------------------------
  # PRESENTATION: CSS-only segmented tabs (mirrors jamisonsoftwaresolutions.com
  # /services). `tabs` = the segmented control; each group carries a `tab` and a
  # `display` (feature | cards | rows).
  # Each item shows a 4-word `what` + 4-word `why` + CTA on the page. The longer
  # `scope` is NOT rendered — it feeds ProfessionalService.offers[] in head.html
  # and the ServiceCatalog ItemList (rich, citable detail for answer engines).
  # ---------------------------------------------------------------------------
  tabs:
    - id: "diagnostics"
      label: "Diagnósticos y paquetes"
    - id: "build"
      label: "Implementación y construcción"
    - id: "programs"
      label: "Programas y retenciones"
    - id: "consulting"
      label: "Consultoría y seguimiento"

  groups:
    - id: "diagnostic"
      tab: "diagnostics"
      display: "feature"
      name: "Empieza aquí: el Diagnóstico de Visibilidad AEO / IA"
      items:
        - slug: "diagnostic"
          name: "Diagnóstico de Visibilidad AEO / IA"
          price: "$1,750"
          cadence: "una sola vez"
          price_min: "1750"
          price_max: "1750"
          price_currency: "USD"
          price_unit: "one-time"
          highlight: true
          what: "Tu informe de visibilidad IA"
          why: "Ve qué te está bloqueando"
          scope: "Auditoría de acceso de robots/crawlers (la realidad de tres niveles de crawlers de 2026, no 'bloquea GPTBot'), comprobación de Google Business Profile + consistencia NAP, prueba de visibilidad con IA contra consultas reales, análisis de reseñas y autoridad, un informe de 10–15 páginas, una llamada de 30 minutos y una hoja de ruta priorizada. Entregado en 10–14 días. Acreditado a la implementación si continúas."
          cta_label: "Empieza con un diagnóstico"
          cta_link: "/?service=diagnostic#contact"

    - id: "flat-packages"
      tab: "diagnostics"
      display: "cards"
      name: "Paquetes a precio fijo para pequeños negocios"
      items:
        - slug: "quick-check"
          name: "AI Visibility Quick Check"
          price: "$495"
          cadence: "una sola vez"
          price_min: "495"
          price_max: "495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Foto rápida de visibilidad"
          why: "Tres arreglos, priorizados"
          scope: "Dónde estás en los principales motores y las tres cosas que arreglar primero."
          cta_label: "Obtener un Quick Check"
          cta_link: "/?service=quick-check#contact"
        - slug: "schema-pack"
          name: "Schema Pack"
          price: "$895"
          cadence: "una sola vez"
          price_min: "895"
          price_max: "895"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Schema validado, listo"
          why: "Los motores pueden leerte"
          scope: "Schema LocalBusiness + FAQPage + Person, generado a partir de tus datos reales y validado en el Test de Resultados Enriquecidos de Google."
          cta_label: "Pedir el Schema Pack"
          cta_link: "/?service=schema-pack#contact"
        - slug: "audit-lite"
          name: "Auditoría AEO (lite)"
          price: "$1,495"
          cadence: "una sola vez"
          price_min: "1495"
          price_max: "1495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Diagnóstico para pequeño negocio"
          why: "Enfocado en una sola ubicación"
          scope: "El diagnóstico, adaptado para un pequeño negocio de una sola ubicación."
          cta_label: "Reservar la auditoría lite"
          cta_link: "/?service=audit-lite#contact"

    - id: "implementation"
      tab: "build"
      display: "feature"
      name: "Optimización para Motores de Respuesta — implementación"
      items:
        - slug: "implementation"
          name: "Implementación AEO"
          price: "$2,500–$6,500"
          cadence: "según alcance"
          price_min: "2500"
          price_max: "6500"
          price_currency: "USD"
          price_unit: "by scope"
          what: "Construimos la base"
          why: "Elegible para ser citado"
          scope: "Robots.txt corregido para la división de crawlers de 2026 (permitir OAI-SearchBot, Claude-SearchBot, PerplexityBot). Schema LocalBusiness, FAQPage y Person, validado, con el texto del schema coincidiendo con el contenido visible. Reescrituras con respuesta-primero — la respuesta en la primera frase. Google Business Profile reclamado y completado; un NAP canónico propagado por los directorios que ingiere la IA. Bing Webmaster Tools, envío de sitemap e IndexNow."
          cta_label: "Definir el alcance de una implementación"
          cta_link: "/?service=implementation#contact"

    - id: "website-build"
      tab: "build"
      display: "feature"
      name: "Construcción de sitio web AEO-nativo"
      items:
        - slug: "build"
          name: "Construcción de sitio web AEO-nativo"
          price: "$6,000–$15,000"
          cadence: "según alcance"
          price_min: "6000"
          price_max: "15000"
          price_currency: "USD"
          price_unit: "by scope"
          what: "Sitio nuevo listo para citas"
          why: "Construido para ser citado"
          scope: "Arquitectura schema-primero, consistencia de entidad integrada, contenido con respuesta-primero, Bing e IndexNow conectados desde el lanzamiento. Entregado conjuntamente con Jamison Software Solutions, LLC."
          cta_label: "Definir el alcance de la construcción"
          cta_link: "/?service=build#contact"

    - id: "programs"
      tab: "programs"
      display: "cards"
      name: "Programas productizados"
      items:
        - slug: "sprint"
          name: "Sprint de Base de 30 Días"
          price: "$5,500"
          cadence: "programa de 30 días"
          price_min: "5500"
          price_max: "5500"
          price_currency: "USD"
          price_unit: "30-day program"
          what: "Elegibilidad en 30 días"
          why: "Base asegurada rápido"
          scope: "Acceso de crawlers, schema, reescrituras con respuesta-primero, GBP + directorios, Bing + IndexNow. Elegibilidad, asegurada en 30 días."
          cta_label: "Reservar el sprint"
          cta_link: "/?service=sprint#contact"
        - slug: "program"
          name: "Programa de Visibilidad IA de 90 Días"
          price: "$12,000–$18,000"
          cadence: "programa de 90 días"
          price_min: "12000"
          price_max: "18000"
          price_currency: "USD"
          price_unit: "90-day program"
          highlight: true
          what: "De elegibilidad a citabilidad"
          why: "Que los motores te nombren"
          scope: "El sprint, más cadencia de contenido, construcción de citas y trabajo de base en medios ganados. De elegibilidad a citabilidad temprana."
          cta_label: "Planificar el programa"
          cta_link: "/?service=program#contact"

    - id: "retainers"
      tab: "programs"
      display: "cards"
      name: "Retenciones"
      items:
        - slug: "foundation"
          name: "Foundation"
          price: "$2,500"
          cadence: "al mes"
          price_min: "2500"
          price_max: "2500"
          price_currency: "USD"
          price_unit: "per month"
          what: "Mantener y monitorizar"
          why: "Conserva lo ganado"
          scope: "Mantenimiento, seguimiento, informe mensual — para un negocio que mantiene el terreno ganado."
          cta_label: "Mantener la posición"
          cta_link: "/?service=foundation#contact"
        - slug: "growth"
          name: "Growth"
          price: "$5,000"
          cadence: "al mes"
          price_min: "5000"
          price_max: "5000"
          price_currency: "USD"
          price_unit: "per month"
          highlight: true
          what: "Contenido más citas"
          why: "Seguir ganando visibilidad"
          scope: "Actualización de schema, cadencia de contenido, construcción de citas, seguimiento e informe mensual de visibilidad con IA."
          cta_label: "Elegir Growth"
          cta_link: "/?service=growth#contact"
        - slug: "concierge"
          name: "Concierge"
          price: "$8,500"
          cadence: "al mes"
          price_min: "8500"
          price_max: "8500"
          price_currency: "USD"
          price_unit: "per month"
          what: "Servicio completo, todos los canales"
          why: "Visibilidad IA, gestionada"
          scope: "SEO + AEO + GEO de servicio completo, informes mensuales propietarios, divulgación en medios ganados, estrategia trimestral."
          cta_label: "Hablar de Concierge"
          cta_link: "/?service=concierge#contact"

    - id: "consulting"
      tab: "consulting"
      display: "rows"
      name: "Optimización de Búsqueda con IA — consultoría multi-motor"
      items:
        - slug: "consulting"
          name: "Consultoría de Visibilidad con IA"
          price: "Programa o retención"
          cadence: "no à la carte"
          price_on_request: true
          what: "Estrategia multi-motor"
          why: "Todos los motores, un plan"
          scope: "Consolidación de entidad en toda la web, estrategia de menciones de marca (las menciones correlacionan con la visibilidad en IA varias veces más que los backlinks), presencia en plataformas de reseñas en los sitios que los motores realmente leen, y medición que te indica si estás ganando o perdiendo terreno. Entregado a través de un programa o retención."
          cta_label: "Hablar de un programa"
          cta_link: "/?service=consulting#contact"

    - id: "tracking"
      tab: "consulting"
      display: "rows"
      name: "Seguimiento gestionado de visibilidad con IA"
      items:
        - slug: "tracking"
          name: "Seguimiento gestionado"
          price: "$150–$500"
          cadence: "al mes"
          price_min: "150"
          price_max: "500"
          price_currency: "USD"
          price_unit: "per month"
          what: "Monitorizamos los paneles"
          why: "Saber qué ha cambiado"
          scope: "Configuración de herramientas, seguimiento continuo y un análisis mensual en lenguaje claro de qué se movió y por qué. La suscripción a la herramienta de seguimiento se factura por separado al coste."
          cta_label: "Configurar el seguimiento"
          cta_link: "/?service=tracking#contact"

  # Ad-hoc hourly — footer addons row + its own Offer (UnitPriceSpecification,
  # HUR) in head.html.
  ad_hoc:
    enable: true
    heading: "Ad-hoc y fuera de alcance"
    label: "Trabajo fuera de alcance, en todos los servicios"
    rate: "$225"
    unit: "/ hora"
    price: "225"
    price_currency: "USD"
    cta_label: "Preguntar por trabajo ad-hoc"
    cta_link: "/?service=ad-hoc#contact"

  # Anti-guarantee posture (footer callout). Load-bearing honesty, not a disclaimer.
  wont_promise:
    label: "Lo que no prometemos"
    body: "Sin garantía de citas. Una sola actualización de modelo puede reemplazar fuentes citadas de un día para otro. Implementamos lo que respalda la evidencia e informamos con honestidad sobre los resultados."

  # Industries declined (footer callout).
  declined:
    label: "Sectores que rechazamos"
    items:
      - "Criptomonedas o NFTs"
      - "MLM o estructuras piramidales"
      - "Contenido adulto"
      - "Venta de armas"
      - "Negocios bajo acción regulatoria activa"

  footnote: "El diagnóstico se acredita a la implementación. Retenciones mes a mes. St. Louis, MO — a nivel nacional, en remoto."

  # Schema-only Offer for free email intake. Consumed by ProfessionalService.offers
  # in head.html; not rendered in the catalog.
  intake:
    enable: true
    name: "Recepción de brief de proyecto"
    description: "Recepción por correo electrónico. Primera respuesta en 48–96 horas."
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "Consulta gratuita"
