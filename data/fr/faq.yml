faq:
  enable: true
  title: "Questions fréquentes"
  items:
    - question: "Qu'est-ce que l'AEO et en quoi diffère-t-il du SEO ?"
      answer: "AEO (Answer Engine Optimization) est la pratique consistant à structurer votre site pour que des outils IA comme ChatGPT, Perplexity et l'aperçu IA de Google vous citent quand quelqu'un pose une question. Le SEO vise les dix liens bleus. L'AEO vise à être la réponse citée. Le travail se recoupe ; l'objectif est différent."

    - question: "L'IA est-elle vraiment en train de remplacer Google ?"
      answer: "Pas totalement, mais la part bouge vite. <a href='https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents' rel='external nofollow'>Gartner prévoit une baisse de 25 % du volume de recherche traditionnelle d'ici 2026</a>. <a href='https://business.adobe.com/blog/ai-traffic-surge-retail-sites-not-machine-readable' rel='external nofollow'>Adobe Digital Insights a rapporté que le trafic IA vers les sites de vente au détail américains a bondi de 393 % au T1 2026</a>. Les clients qui demandent des recommandations à l'IA sont une part grandissante."

    - question: "Combien coûte l'AEO ?"
      answer: "Trois niveaux. Audit : 250 USD ponctuel. Mise en place et transfert : 700 USD ponctuel. Service géré : 500 à 1 200 USD par mois. Nous ne cachons pas les prix et ne facturons pas des tarifs différents à des prospects différents. Le niveau dépend de votre choix : apprendre, l'exploiter ensuite, ou nous laisser tout gérer."

    - question: "Combien de temps avant de voir des résultats ?"
      answer: "Premiers changements mesurables en environ 30 jours. Résultats stables vers le sixième mois. Le travail est fondateur — le premier mois ressemble à une perte nette parce que nous corrigeons ce qui aurait dû l'être avant. Au douzième mois, la courbe se compose. Quiconque promet plus vite ment ou pénalisera votre entreprise."

    - question: "Pourquoi vos prix sont-ils si bas par rapport aux autres agences ?"
      answer: "Deux raisons. Nous limitons la première année à 5 clients de St. Louis, donc pas de coûts d'agence. Et nous exécutons le travail nous-mêmes — pas de chef de projet, pas de chargé de compte, pas de présentation. Croissance lente signifie service approfondi. Pour un logo dans un portefeuille de 200 clients, nous ne sommes pas le bon choix."

    - question: "Pouvez-vous garantir la première position ou une citation ChatGPT ?"
      answer: "Non, et quiconque le promet ment ou enfreint les règles de Google. Ce que nous garantissons, c'est le travail : chaque mois vous voyez ce que nous avons fait, vous gardez le contrôle de vos comptes, vous pouvez arrêter à tout moment. L'objectif visé est un calcul de ROI réaliste, pas une position."

    - question: "Et si j'ai déjà une personne qui s'occupe du SEO ?"
      answer: "AEO et SEO se recoupent ; un bon travail SEO facilite le nôtre. Nous coordonnons souvent avec la personne en place plutôt que de la remplacer. Si votre configuration SEO est solide, l'Audit est le bon point de départ — il indique quels écarts AEO combler sans refaire ce qui fonctionne."

    - question: "Et si je n'ai même pas de site web ?"
      answer: "Vous pouvez être cité par l'IA sans site web. Les moteurs IA tirent leurs informations de Google Business Profile, Yelp, Foursquare, Apple Business Connect, etc. Nous revendiquons et complétons ces fiches d'abord. Un site basique de cinq pages vient ensuite. Vous contrôlez entièrement le site, mais ce n'est pas la fondation — vos fiches d'entreprise le sont."

    - question: "Et mon Google Business Profile ?"
      answer: "Le GBP est le levier au plus haut ROI pour une entreprise locale. Un profil complet peut entrer dans le local 3-pack sous 30–60 jours sans autre changement. Si votre profil est non revendiqué, à moitié rempli, ou sans photos, c'est par là que commence chaque mission. <a href='https://whitespark.ca/local-search-ranking-factors/' rel='external nofollow'>L'étude Whitespark 2024</a> place le GBP au n°1 du local pack."

    - question: "Et si je veux arrêter ?"
      answer: "Arrêtez. Vous êtes propriétaire de tout ce que nous touchons — votre domaine, votre GBP, vos comptes, votre contenu. Aucun contrat dépassant le mois en mois. Si le travail ne paie pas, vous devriez partir, et honnêtement nous préférons le savoir. Verrouiller un client est le signe que le travail n'est pas assez bon pour le retenir volontairement."

    - question: "'AEO' est-il identique à Answer Engine Optimization ?"
      answer: "Oui. Nous utilisons AEO comme abréviation sur tout le site. C'est la même chose que Generative Engine Optimization (GEO) — l'industrie n'a pas encore tranché. Note : 'AEO' est aussi le symbole boursier d'American Eagle Outfitters. Industrie distincte, classe de marque distincte. Notre service est dans le marketing, pas dans le vêtement."

    - question: "Puis-je le faire moi-même avec l'Audit ?"
      answer: "Oui. Le niveau Audit est pensé pour ça. Vous recevez la liste de corrections priorisées et une session d'une heure, puis vous implémentez à votre rythme. La plupart des propriétaires peuvent corriger les points à fort impact en une après-midi — robots.txt, Bing Webmaster Tools, bases du schema. L'Audit est crédité sur le Setup si vous changez d'avis ensuite."
