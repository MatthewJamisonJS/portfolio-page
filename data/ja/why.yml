why:
  enable: true
  title: "あなたのお客様は、あなたと同じようなビジネスのことをAIに尋ねています。"
  subtitle: "ほとんどのビジネスはAIから見えていません。"
  intro: "6つの事実。すべて30秒で確認できる公開ソースからです。順番に根拠を積み上げています。"
  stats:
    - id: "adoption"
      headline: "消費者の45%がAIにローカルビジネスの推薦を尋ねています——1年前の6%から急増。"
      body: "クエリを入力することからチャットボットに尋ねることへの移行は、Yellow PagesからGoogleへの移行よりも速いペースで進んでいます。"
      source_label: "BrightLocal, Local Consumer Review Survey 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "zero-click"
      headline: "AI検索セッションの93%は、ウェブサイトへのクリックが一度もないまま終わります。"
      body: "引用がコンバージョンです。AIが答え、購買者が判断し、訪問は発生しません。引用されていなければ、会話に参加できていません。"
      source_label: "業界調査まとめ、2026年"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "citation-share"
      headline: "AI Overviewsの引用の60%はサードパーティサイトへ。個別ビジネスへの直接引用はわずか40%。"
      body: "2つの戦線で競う必要があります。Yelp、Reddit、Quoraに引用されること、そして自社が直接引用されること。どちらも構造化された機械可読コンテンツが必要です。"
      source_label: "AI Overview引用の内訳、2026年"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "overlap"
      headline: "AI Overviewsは追跡クエリの約48%に登場しますが、引用ソースのうちGoogleオーガニック上位10位に入っているのは17%のみ。"
      body: "Googleの1ページ目にランクインしていても、AIに引用されるとは限りません。AEOは独立した可視性の指標です。"
      source_label: "Whitespark AI Overviews調査、2026年"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "search-shift"
      headline: "今年末までに全検索トラフィックの25%がAIに移行。"
      body: "2024年にはSFのように聞こえた早期予測が、今はスケジュール表のように読めます。"
      source_label: "Gartner予測、2024年2月"
      source_url: "https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents"
    - id: "gbp-rank"
      headline: "Google Business Profileは、AI検索と従来の検索の両方でローカル結果の第1位ランキング要因であり続けています。"
      body: "プロフィールが未申請、半分しか埋まっていない、写真がないなら、その一つの修正が他のどの施策よりも効果的です。"
      source_label: "Whitespark、2026年ローカル検索ランキング要因"
      source_url: "https://whitespark.ca/local-search-ranking-factors/"
  outro:
    body: "端的に言えば：あなたのサイト、Google Business Profile、サードパーティリスティングを構造化し、顧客が尋ねたときにAIツールがあなたを引用するようにします。対象ツールはChatGPT、Perplexity、GoogleのAI Overview、Claudeです。[私たちが実際に行うことを見る](/different/)——AI検索、クラシック検索、サードパーティリスティング全体の可視性をどのように監査するか。"
    cta_label: "私たちが実際に行うことを見る"
    cta_link: "/different/"
