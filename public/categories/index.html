<script>
(function() {
	
	const urlParams = new URLSearchParams(window.location.search);
	const service = urlParams.get('service');

	if (service) {
		
		const serviceNames = {
			'foundation': 'Foundation Service',
			'complete-presence': 'Complete Presence',
			'partnership': 'Partnership',
			'budget-inquiry': 'Budget Inquiry',
			'consultation': 'Consultation',
			'general': 'General Inquiry'
		};

		const serviceName = serviceNames[service];

		if (serviceName) {
			
			document.addEventListener('DOMContentLoaded', function() {
				
				const subjectField = document.getElementById('subject');
				if (subjectField) {
					subjectField.placeholder = serviceName;
					subjectField.style.color = '#9ca3af'; 
				}

				
				const serviceTierField = document.getElementById('service-tier');
				if (serviceTierField) {
					serviceTierField.value = serviceName;
				}

				
				const contactSection = document.getElementById('contact');
				if (contactSection) {
					setTimeout(function() {
						contactSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
					}, 100);
				}

				
				setTimeout(function() {
					const nameField = document.getElementById('name');
					if (nameField) {
						nameField.focus();
					}
				}, 800);
			});
		}
	}
})();
</script>


<script>
(function() {
	document.addEventListener('DOMContentLoaded', function() {
		const faqButtons = document.querySelectorAll('.faq-question');

		faqButtons.forEach(button => {
			button.addEventListener('click', function() {
				const faqItem = this.parentElement;
				const answer = faqItem.querySelector('.faq-answer');
				const isExpanded = this.getAttribute('aria-expanded') === 'true';

				
				faqButtons.forEach(otherButton => {
					if (otherButton !== this) {
						otherButton.setAttribute('aria-expanded', 'false');
						otherButton.querySelector('.faq-icon').textContent = '+';
						otherButton.parentElement.querySelector('.faq-answer').style.maxHeight = '0';
					}
				});

				
				if (isExpanded) {
					this.setAttribute('aria-expanded', 'false');
					this.querySelector('.faq-icon').textContent = '+';
					answer.style.maxHeight = '0';
				} else {
					this.setAttribute('aria-expanded', 'true');
					this.querySelector('.faq-icon').textContent = '−';
					answer.style.maxHeight = answer.scrollHeight + 'px';
				}
			});
		});
	});
})();
</script>
