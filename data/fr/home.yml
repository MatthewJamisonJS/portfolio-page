home:
  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "Qu'est-ce que l'Optimisation pour Moteurs de Réponse ?"
      body: |
        L'AEO, c'est le travail que tu fais pour que les outils d'IA te citent quand un client pose une question. ChatGPT, Perplexity, Google AI Overview, Claude, Apple Intelligence, Bing Copilot. Le SEO court après les dix liens bleus ; l'AEO vise à être la réponse citée. Mêmes fondations techniques (schema, vitesse de page, URLs propres), but différent. Le SEO bâtit la découvrabilité. L'AEO bâtit quelque chose que l'IA peut citer.

        La façon dont les gens cherchent a changé. Au lieu de taper « plombier près de chez moi » et de balayer dix résultats, les clients posent toute la question à un assistant : « Quel est le meilleur plombier d'urgence dans le sud de St. Louis qui ouvre tôt ? » Ils reçoivent une seule phrase. Un ou deux noms. Parfois un lien. Si tu n'es pas dans la réponse, le reste de ton marketing n'a même pas l'occasion de travailler.

    - id: "why-matters-local"
      heading: "Pourquoi cela compte pour les entreprises locales de St. Louis"
      body: |
        45 % des consommateurs locaux demandent à l'IA des recommandations d'entreprises. Il y a un an, ce chiffre était à 6 %. La migration des Pages Jaunes vers Google n'a pas bougé aussi vite. La plupart des entreprises locales de St. Louis restent invisibles pour cette IA : robots.txt bloqué, pas de schema, fiches non revendiquées. Tes concurrents sont cités quand l'IA cherche plombiers, comptables, agents immobiliers ; toi, non. Les clients sont réels et l'écart s'élargit chaque trimestre.

    - id: "how-we-work"
      heading: "Comment on travaille"
      body: |
        Trois piliers guident chaque choix : **Technique** (l'IA peut-elle te trouver ?), **Autorité** (l'IA te fait-elle confiance ?), **Contenu** (réponds-tu à ce qu'on demande ?). On audite les trois, on rédige une liste priorisée de corrections et on t'aide à passer à l'action. [Lis ce qui nous différencie.](/different/)

        Choisis le palier qui colle à ta bande passante. Audit si tu veux l'apprendre et le faire toi-même. Setup & Hand-off si tu veux que ce soit bien construit puis remis. Done-For-You si tu veux que ça soit géré de bout en bout. Chaque mission commence pareil : un audit écrit que tu gardes, que tu continues avec nous ou non. L'audit nomme les problèmes précis de ton site, les classe par impact, montre les preuves vérifiables. Pas de propositions déguisées en rapports.

    - id: "who-this-for"
      heading: "Pour qui c'est, et pour qui ce n'est pas"
      body: |
        Ça marche pour les entreprises de services à géographie serrée. Plombiers, électriciens, CVC, dentaires, juridiques, comptables, réparation maison, immobilier, commerce local. Plus ta zone de service est nette, mieux l'AEO performe : les moteurs de réponse pèsent fort l'intention locale et le terrain concurrentiel rétrécit. Si tu es un SaaS qui vise un classement national sur Google, le SEO classique et la pub payante restent maîtres du ROI. Si tu es une entreprise locale autour de St. Louis, l'AEO est le levier que presque personne n'actionne encore.

        On plafonne la première année à 5 clients. Le travail local demande de l'attention ; s'il faut t'ajouter à un portefeuille de 100 autres, on n'est pas le bon choix. On préfère les propriétaires-opérateurs et les petites équipes. On ne travaille pas avec les chaînes multi-sites, les fermes de génération de leads, ni les entreprises dont le modèle repose sur cacher le vrai prix. Seules les entreprises honnêtes gagnent à être plus trouvables.

    - id: "day-one-deliverables"
      heading: "Ce que tu obtiens dès le premier jour"
      body: |
        Quatre fondations techniques sont câblées le premier jour. Le **schema markup** étiquette ton entreprise, ses horaires, son adresse, ses avis et ses FAQ dans le format que les moteurs d'IA lisent nativement. **robots.txt** autorise explicitement GPTBot, ClaudeBot et PerplexityBot à parcourir ton site (la plupart des entreprises locales les bloquent par accident). Le **sitemap vérifié** liste chaque page pour que l'indexation soit complète. **llms.txt** oriente les outils d'IA vers ta licence, ta politique de confidentialité et tout contenu hors-limites. Ces quatre fichiers prennent un après-midi. La plupart des sites locaux en ont zéro. C'est ça, l'écart.

        Après les quatre fichiers, on configure ton Profil Google Business, on revendique et on aligne ta fiche Apple Business Connect, et on corrige la cohérence NAP (nom, adresse, téléphone) dans les annuaires que les moteurs d'IA lisent vraiment. On ajoute le schema d'avis pour que les étoiles voyagent dans les réponses d'IA. Chaque changement est consigné dans un rapport en langage clair, pour que tu voies ce qui a été fait et pourquoi. Pas de rapports boîte noire.
      cta_text: "Voir les prix détaillés"
      cta_link: "/pricing/"
