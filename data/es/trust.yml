      description: "La prueba del hero — categorías genéricas de negocios de St. Louis citadas por cuatro motores, en bucle. Mira cómo las respuestas eligen ganadores."
    - title: "Credibilidad del ecosistema Rails."
      description: "Desarrollador de Ruby on Rails. El framework impulsa Shopify (5.5M+ comerciantes, ~19M consultas MySQL/seg en el monolito). 194+ pull requests fusionados, verificables en GitHub."
    - title: "Postura de operador transparente."
      description: "Precios públicos. Cupo de clientes público. Métodos públicos. Sin sobrecosto de agencia. Sin NDAs para leer los métodos."
    - title: "Afiliaciones locales."
      description: "Logos de cámaras + organizaciones vecinales de St. Louis en el pie una vez confirmadas. Etiqueta física de la ciudad junto a cada CTA."
    - title: "Contacto directo con el desarrollador."
      description: "Correo, calendario — sin gerente de proyecto, sin bot. Tiempo de respuesta declarado, no implícito."