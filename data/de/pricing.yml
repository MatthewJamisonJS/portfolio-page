pricing:
  enable: true
  title: "Leistungen & Preise"
  subtitle: "Unternehmen gefunden, vertraut und von KI zitiert."
  # Prägnanter Einstieg über den Tabs. Bewusst kurz gehalten.
  principle:
    label: "So funktioniert es"
    body: "Förderfähigkeit zuerst, dann Zitierfähigkeit."

  # ---------------------------------------------------------------------------
  # PRESENTATION: CSS-only segmented tabs (mirrors jamisonsoftwaresolutions.com
  # /services). `tabs` = the segmented control; each group carries a `tab` and a
  # `display` (feature | cards | rows).
  # Each item shows a 4-word `what` + 4-word `why` + CTA on the page. The longer
  # `scope` is NOT rendered — it feeds ProfessionalService.offers[] in head.html
  # and the ServiceCatalog ItemList (rich, citable detail for answer engines).
  # ---------------------------------------------------------------------------
  tabs:
    - id: "diagnostics"
      label: "Diagnosen & Pakete"
    - id: "build"
      label: "Umsetzung & Builds"
    - id: "programs"
      label: "Programme"

  groups:
    - id: "diagnostic"
      tab: "diagnostics"
      display: "feature"
      name: "Hier beginnen: die AEO / KI-Sichtbarkeits-Diagnose"
      items:
        - slug: "diagnostic"
          name: "AEO / KI-Sichtbarkeits-Diagnose"
          price: "$1,750"
          cadence: "einmalig"
          price_min: "1750"
          price_max: "1750"
          price_currency: "USD"
          price_unit: "one-time"
          highlight: true
          what: "Ihr KI-Sichtbarkeitsbericht"
          why: "Zeigt, was Sie blockiert"
          scope: "Robots/Crawler-Zugangsprüfung (die 2026er Drei-Ebenen-Crawler-Realität, nicht nur 'GPTBot blockieren'), Google Business Profile + NAP-Konsistenzprüfung, ein KI-Sichtbarkeits-Schnelltest anhand echter Suchanfragen, eine Bewertungs- und Autoritätsprüfung, ein 10–15-seitiger Bericht, ein 30-minütiges Gespräch und ein priorisierter Fahrplan. Lieferzeit 10–14 Tage. Wird auf die Implementierung angerechnet, wenn Sie fortfahren."
          cta_label: "Mit einer Diagnose starten"
          cta_link: "/?service=diagnostic#contact"

    - id: "flat-packages"
      tab: "diagnostics"
      display: "cards"
      name: "Festpreispakete für Kleinunternehmen"
      items:
        - slug: "quick-check"
          name: "AI Visibility Quick Check"
          price: "$495"
          cadence: "einmalig"
          price_min: "495"
          price_max: "495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Schnelle Sichtbarkeitsanalyse"
          why: "Drei Korrekturen, priorisiert"
          scope: "Wo Sie bei den wichtigsten KI-Tools stehen — und die drei vordringlichsten Korrekturen."
          cta_label: "Quick Check buchen"
          cta_link: "/?service=quick-check#contact"
        - slug: "schema-pack"
          name: "Schema-Paket"
          price: "$895"
          cadence: "einmalig"
          price_min: "895"
          price_max: "895"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Validiertes Schema, fertig"
          why: "KI kann Sie lesen"
          scope: "LocalBusiness + FAQPage + Person Schema, aus Ihren echten Daten generiert und im Google Rich Results Test validiert."
          cta_label: "Schema-Paket bestellen"
          cta_link: "/?service=schema-pack#contact"
        - slug: "audit-lite"
          name: "AEO-Audit (lite)"
          price: "$1,495"
          cadence: "einmalig"
          price_min: "1495"
          price_max: "1495"
          price_currency: "USD"
          price_unit: "one-time"
          what: "Kleinunternehmen-Diagnose"
          why: "Fokus auf einen Standort"
          scope: "Die Diagnose, skaliert für ein Kleinunternehmen mit einem Standort."
          cta_label: "Lite-Audit buchen"
          cta_link: "/?service=audit-lite#contact"

    - id: "implementation"
      tab: "build"
      display: "feature"
      name: "Answer Engine Optimization — Umsetzung"
      items:
        - slug: "implementation"
          name: "AEO-Implementierung"
          price: "$2,500–$6,500"
          cadence: "nach Umfang"
          price_min: "2500"
          price_max: "6500"
          price_currency: "USD"
          price_unit: "by scope"
          what: "Wir bauen das Fundament"
          why: "Förderfähig für Zitate"
          scope: "robots.txt für die 2026er Crawler-Aufteilung korrigiert (OAI-SearchBot, Claude-SearchBot, PerplexityBot erlaubt). LocalBusiness-, FAQPage- und Person-Schema validiert, Schema-Text mit sichtbarem Inhalt abgeglichen. Antwortorientierte Überarbeitungen — die Antwort im ersten Satz. Google Business Profile beansprucht und vervollständigt; ein kanonisches NAP in den Verzeichnissen propagiert, die KI tatsächlich einliest. Bing Webmaster Tools, Sitemap-Einreichung und IndexNow."
          cta_label: "Umsetzung besprechen"
          cta_link: "/?service=implementation#contact"

    - id: "website-build"
      tab: "build"
      display: "feature"
      name: "AEO-native Website-Entwicklung"
      items:
        - slug: "build"
          name: "AEO-native Website-Entwicklung"
          price: "$6,000–$15,000"
          cadence: "nach Umfang"
          price_min: "6000"
          price_max: "15000"
          price_currency: "USD"
          price_unit: "by scope"
          what: "Neue zitierfähige Website"
          why: "Von Grund auf zitierfähig"
          scope: "Schema-first-Architektur, Entity-Konsistenz eingebaut, antwortorientierter Inhalt, Bing und IndexNow von Anfang an eingebunden. Geliefert gemeinsam mit Jamison Software Solutions, LLC."
          cta_label: "Build besprechen"
          cta_link: "/?service=build#contact"

    - id: "programs"
      tab: "programs"
      display: "cards"
      name: "Fertige Programme"
      items:
        - slug: "sprint"
          name: "30-Tages-Foundation-Sprint"
          price: "$5,500"
          cadence: "30-Tages-Programm"
          price_min: "5500"
          price_max: "5500"
          price_currency: "USD"
          price_unit: "30-day program"
          what: "Förderfähig in 30 Tagen"
          why: "Fundament schnell gesichert"
          scope: "Crawler-Zugang, Schema, antwortorientierte Überarbeitungen, GBP + Verzeichnisse, Bing + IndexNow. Förderfähigkeit, in 30 Tagen gesichert."
          cta_label: "Sprint buchen"
          cta_link: "/?service=sprint#contact"
        - slug: "program"
          name: "90-Tages-KI-Sichtbarkeitsprogramm"
          price: "$12,000–$18,000"
          cadence: "90-Tages-Programm"
          price_min: "12000"
          price_max: "18000"
          price_currency: "USD"
          price_unit: "90-day program"
          highlight: true
          what: "Von Förder- zu Zitierfähigkeit"
          why: "Von KI namentlich genannt"
          scope: "Der Sprint, plus Content-Rhythmus, Zitatsaufbau und Grundlagen für Earned Media. Von Förderfähigkeit zu früher Zitierfähigkeit."
          cta_label: "Programm planen"
          cta_link: "/?service=program#contact"

  # Anti-guarantee posture (footer callout). Load-bearing honesty, not a disclaimer.
  wont_promise:
    label: "Was wir nicht versprechen"
    body: "Keine garantierten Zitate. Ein einziges Modell-Update kann zitierte Quellen über Nacht ersetzen. Wir setzen um, was die Belege stützen, und berichten ehrlich dagegen."

  # Industries declined (footer callout).
  declined:
    label: "Branchen, die wir ablehnen"
    items:
      - "Kryptowährungen oder NFTs"
      - "MLM oder Pyramidenstrukturen"
      - "Inhalte für Erwachsene"
      - "Waffenverkauf"
      - "Unternehmen unter aktiven Regulierungsmaßnahmen"

  footnote: "Diagnose wird auf die Implementierung angerechnet. Festpreis-Engagements ohne Bindung. St. Louis, MO — bundesweit, remote."

  # Schema-only Offer for free email intake. Consumed by ProfessionalService.offers
  # in head.html; not rendered in the catalog.
  intake:
    enable: true
    name: "Projektanfrage-Eingang"
    description: "E-Mail-first Anfrage. Erste Antwort innerhalb von 48–96 Stunden."
    price: "0"
    price_currency: "USD"
    url_path: "?service=brief#contact"
    category: "Kostenlose Beratung"
