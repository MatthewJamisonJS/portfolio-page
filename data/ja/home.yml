home:
  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "Answer Engine Optimizationとは何か"
      body: |
        AEOとは、誰かが質問したときにAIツールがあなたを引用するために行う取り組みです。ChatGPT、Perplexity、GoogleのAI Overviews、Claude、Apple Intelligence、Bing Copilot。SEOが10件の検索結果を狙うとするなら、AEOは「引用される答え」になることを目指します。基礎的な技術（schema、ページ速度、クリーンなURL）は同じですが、ゴールが違います。SEOは発見可能性を高め、AEOはエンジンが引用できる権威性を築きます。

        人々の検索行動が変わりました。キーワードを入力して結果ページをスキャンするのではなく、質問をまるごと投げかけます——「セントルイス南部で朝早く開く緊急配管業者は」「B2B SaaS向けにAEOを手がける会社は」——そして1〜2件の名前が返ってきます。リンクがある場合もあれば、まったくない場合もあります。その答えに含まれていなければ、残りのマーケティング施策が機能する番は一度も来ません。

    - id: "why-matters-local"
      heading: "なぜ今これが重要なのか"
      body: |
        検索は10件の青いリンクではなくなりました。人々はアシスタントに尋ね、返ってきた答えをもとに行動します。BrightLocalの2026年調査では、ビジネス情報へのAI活用率が45%に達し、前年の6%から急増しました。Yellow PagesからGoogleへの移行でさえ、これほど速くはありませんでした。問題は、引用されることとランクインすることが同じではない点です。Whitesparkは追跡クエリの約48%でAI Overviewsが表示されていることを確認しましたが、そこで引用されたソースのうちGoogleオーガニック上位10位に同時に入っているのはわずか17%です。1ページ目を独占していても、答えには不在ということがあり得ます。

        ほとんどのビジネスがこれに対して無防備なのは、単純な理由からです。クローラーをブロックするrobots.txt、schemaの欠如、誰も申請していないリスティング。これがギャップであり、四半期ごとに広がっています。[その背景にある6つの事実を読む。](/why/)

    - id: "how-we-work"
      heading: "作業の進め方"
      body: |
        2つの層を順番に。まず**適格性**——エンティティが存在し、クローラーがアクセスでき、答えが機械可読であること。次に**引用可能性**——外部ソースが十分にあなたを裏付けており、エンジンがあなたを信頼して名前を出せること。壊れた基盤に権威性を注いでも何も増幅しないため、そうはしません。

        ほとんどのエンゲージメントは診断から始まります。主要なエンジン全体でのポジションと、何が妨げているかを読み解くもので、実装に進む場合はその費用に充当されます。そこからスコープ型の実装、30日または90日プログラムへと進みます——どれだけ自分で管理したいか、どれだけ委託したいかに応じて選べます。[全メニューと費用はこちら。](/pricing/)

    - id: "who-this-for"
      heading: "対象となる方とそうでない方"
      body: |
        エンジンが返す答えになりたいビジネスのために。地理的に絞られたローカルサービス業は特に効果が出やすいです。答えエンジンはローカルの意図を重視し、競合が少ないためです。全国規模でB2Bを展開する企業も同様に恩恵を受けます。購買担当者が質問形式でリサーチするからです。いずれも形は同じです。エンティティを読み取り可能にし、次に引用されるようにする。

        暗号通貨やNFTプロジェクト、MLM構造、アダルトコンテンツ、銃器販売、規制当局の調査下にある事業はお断りしています。また、引用を保証することもありません——検索パイプラインは独自のスケジュールで再ランク付けし、モデルの更新一つで前日まで引用されていたソースが入れ替わることもあります。私たちが約束するのは、検証できる誠実な作業と、あなたが完全なコントロールを保てるアカウントです。

    - id: "day-one-deliverables"
      heading: "最初に整えるもの"
      body: |
        基盤は、ほとんどのサイトが持っていないいくつかのファイルです。**Schemaマークアップ**はビジネス情報、営業時間、住所、レビュー、FAQをエンジンがネイティブに読める構造化フォーマットでタグ付けします。**robots.txt**は2026年のクローラー区分に合わせて修正します——`OAI-SearchBot`、`Claude-SearchBot`、`PerplexityBot`のような答えクローラーは名前で許可し、学習クローラーは偶然ではなく意図的に判断する別問題として扱います。**検証済みサイトマップ**と**IndexNow**および**Bing Webmaster Tools**は、ほとんどの業者が見落とす最もコスパの高いシグナルをカバーします。そして**llms.txt**はAIツールにライセンスされているコンテンツとそうでないものを伝えます。

        次にローカル層：Google Business Profileを申請・整備し、エンジンが実際に収集するディレクトリ全体に一つの正規NAP（名前・住所・電話番号）を展開し、星評価が答えに反映されるようレビューschemaを追加します。すべての変更はわかりやすいレポートに記録されるため、何を行い、なぜ行ったかを確認できます。ブラックボックスのダッシュボードはありません。
      cta_text: "サービスと料金を見る"
      cta_link: "/pricing/"
