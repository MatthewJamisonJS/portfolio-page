why:
  enable: true
  title: "Vos clients interrogent l'IA sur des entreprises comme la vôtre."
  subtitle: "La plupart des entreprises en sont invisibles."
  intro: "Six faits, tous issus de sources publiques que vous pouvez vérifier en 30 secondes. Ils construisent l'argument dans l'ordre."
  stats:
    - id: "adoption"
      headline: "45 % des consommateurs demandent à l'IA des recommandations d'entreprises locales — contre 6 % il y a un an."
      body: "Le passage du mot-clé tapé à la question posée à un chatbot se fait plus vite que le passage lui-même des Pages Jaunes à Google."
      source_label: "BrightLocal, Local Consumer Review Survey 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "zero-click"
      headline: "93 % des sessions de recherche IA se terminent sans un seul clic vers un site web."
      body: "La citation est la conversion. L'IA répond, l'acheteur décide, la visite n'a jamais lieu. Si vous n'êtes pas cité, vous n'êtes pas dans la conversation."
      source_label: "Compilation de recherches sectorielles, 2026"
      source_url: "https://www.brightlocal.com/research/lcrs-ai-trust/"
    - id: "citation-share"
      headline: "60 % des citations dans les AI Overviews vont à des sites tiers. Seulement 40 % citent directement des entreprises individuelles."
      body: "Vous concourrez sur deux fronts : être cité par Yelp, Reddit, Quora — et être cité directement. Les deux exigent un contenu structuré et lisible par les machines."
      source_label: "Analyse des citations AI Overview, 2026"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "overlap"
      headline: "Les AI Overviews apparaissent sur ~48 % des requêtes suivies, mais seulement 17 % des sources citées figurent aussi dans le top 10 organique de Google."
      body: "Se classer en première page de Google ne signifie pas que l'IA vous cite. L'AEO est une surface de visibilité distincte."
      source_label: "Recherche Whitespark sur les AI Overviews, 2026"
      source_url: "https://whitespark.ca/blog/case-study-the-prevalence-of-ai-overviews-in-local-search/"
    - id: "search-shift"
      headline: "25 % de tout le trafic de recherche bascule vers l'IA d'ici la fin de cette année."
      body: "La prévision précoce qui ressemblait à de la science-fiction en 2024 ressemble maintenant au calendrier réel."
      source_label: "Prévision Gartner, février 2024"
      source_url: "https://www.gartner.com/en/newsroom/press-releases/2024-02-19-gartner-predicts-search-engine-volume-will-drop-25-percent-by-2026-due-to-ai-chatbots-and-other-virtual-agents"
    - id: "gbp-rank"
      headline: "Le Google Business Profile reste le facteur de classement n°1 pour les résultats locaux — en recherche IA et en recherche traditionnelle."
      body: "Si votre fiche est non revendiquée, à moitié vide ou sans photos, ce seul correctif dépasse en impact tout ce que vous pourriez faire d'autre."
      source_label: "Whitespark, 2026 Local Search Ranking Factors"
      source_url: "https://whitespark.ca/local-search-ranking-factors/"
  outro:
    body: "En résumé : nous structurons votre site, votre Google Business Profile et vos fiches tierces pour que les outils d'IA vous citent quand les clients posent une question. Ces outils incluent ChatGPT, Perplexity, Google AI Overview et Claude. [Voyez ce que nous faisons concrètement](/different/) et comment nous auditons la visibilité sur la recherche IA, la recherche classique et les fiches tierces."
    cta_label: "Voir ce que nous faisons concrètement"
    cta_link: "/different/"
