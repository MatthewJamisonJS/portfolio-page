home:
  enable: true
  sections:
    - id: "what-is-aeo"
      heading: "¿Qué es la Optimización para Motores de Respuesta?"
      body: |
        AEO es el trabajo que haces para que las herramientas de IA te citen cuando un cliente pregunta. ChatGPT, Perplexity, Google AI Overview, Claude, Apple Intelligence, Bing Copilot. El SEO persigue los diez enlaces azules; el AEO busca ser la respuesta citada. Misma higiene técnica (schema, velocidad de página, URLs limpias), línea de meta distinta. El SEO construye visibilidad. El AEO construye algo que la IA puede citar.

        Cómo busca la gente ha cambiado. En vez de escribir "plomero cerca de mí" y revisar diez resultados, los clientes le hacen al asistente la pregunta completa: "¿Quién es el mejor plomero de emergencia en el sur de St. Louis que abre temprano?" Reciben una sola frase. Uno o dos nombres. A veces un enlace. Si no estás en la respuesta, el resto de tu marketing no llega a trabajar.

    - id: "why-matters-local"
      heading: "Por qué esto importa para los negocios locales de St. Louis"
      body: |
        El 45 % de los consumidores locales le pide a la IA recomendaciones de negocios. Hace un año esa cifra era del 6 %. La migración de Páginas Amarillas a Google no se movió tan rápido. La mayoría de los negocios locales de St. Louis siguen siendo invisibles para esa IA: robots.txt bloqueado, sin schema, fichas sin reclamar. Tus competidores aparecen citados cuando la IA busca plomeros, contadores, agentes inmobiliarios; tú no. Los clientes son reales y la brecha se ensancha cada trimestre.

    - id: "how-we-work"
      heading: "Cómo trabajamos"
      body: |
        Tres pilares guían cada decisión: **Técnico** (¿la IA puede encontrarte?), **Autoridad** (¿la IA confía en ti?), **Contenido** (¿respondes a lo que preguntan?). Auditamos los tres, te escribimos una lista priorizada de arreglos y te acompañamos a ejecutarla. [Lee qué nos hace diferentes.](/different/)

        Elige el nivel que se ajusta a tu ancho de banda. Auditoría si quieres aprenderlo y ejecutarlo tú mismo. Implementación y Entrega si quieres que se construya bien y luego se te entregue. Servicio Gestionado si quieres que lo manejemos de extremo a extremo. Cada compromiso empieza igual: una auditoría escrita que te quedas, sigas con nosotros o no. La auditoría nombra los problemas específicos de tu sitio, los ordena por impacto y muestra la evidencia verificable. No propuestas disfrazadas de informes.

    - id: "who-this-for"
      heading: "Para quién es esto, y para quién no"
      body: |
        Funciona para negocios de servicios con geografía cerrada. Plomeros, electricistas, HVAC, dental, legal, contaduría, reparaciones, inmobiliarios, comercio local. Cuanto más afinada sea tu zona de servicio, mejor rinde el AEO: los motores de respuesta pesan mucho la intención local y el campo competitivo se reduce. Si eres una SaaS intentando posicionarte a nivel nacional en Google, el SEO clásico y los anuncios pagados se llevan tu ROI. Si eres un negocio local en el área de St. Louis, el AEO es la palanca que casi nadie está tirando todavía.

        Limitamos el primer año a 5 clientes. El trabajo local pide atención; si necesitas que te sumemos a una cartera de 100, no somos el ajuste. Preferimos dueños operadores y equipos pequeños. No trabajamos con cadenas multi-local, granjas de generación de leads, ni negocios cuyo modelo depende de esconder el precio real. Solo los negocios honestos se benefician de ser más visibles.

    - id: "day-one-deliverables"
      heading: "Lo que recibes el primer día"
      body: |
        Cuatro fundamentos técnicos quedan conectados el día uno. El **schema markup** etiqueta tu negocio, horarios, dirección, reseñas y FAQ en el formato que los motores de IA leen de forma nativa. **robots.txt** permite explícitamente a GPTBot, ClaudeBot y PerplexityBot rastrear tu sitio (la mayoría de los negocios locales los bloquea sin querer). **Mapa del sitio verificado** lista cada página para que la indexación quede completa. **llms.txt** apunta a las herramientas de IA hacia tu licencia, políticas de privacidad y cualquier contenido restringido. Estos cuatro archivos toman una tarde. La mayoría de los sitios locales tiene cero. Esa es la brecha.

        Después de los cuatro archivos, configuramos tu Perfil de Google Business, reclamamos y alineamos tu ficha de Apple Business Connect, y arreglamos la consistencia NAP (nombre, dirección, teléfono) en los directorios que los motores de IA realmente leen. Se añade el schema de reseñas para que las estrellas viajen a las respuestas de IA. Cada cambio queda documentado en un informe en lenguaje claro para que veas qué se hizo y por qué. Nada de informes caja negra.
      cta_text: "Ver precios detallados"
      cta_link: "/pricing/"
