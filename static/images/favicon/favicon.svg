<?xml version="1.0" encoding="UTF-8"?>
<!--
  Operator brand mark for matthewjamison.dev (audit C6 replacement).
  Tokens come from assets/css/critical-inline.css lines 6 to 15: accent
  (cyan letterforms, #00bcd4), primary (magenta underline, #e91e63),
  dark-bg (background, #0a0a0a). ViewBox is 100x100 so the same SVG
  renders cleanly at 16, 32, 180, and 512 pixels.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Matthew Jamison">
  <title>MJ — Matthew Jamison</title>
  <rect width="100" height="100" rx="14" fill="#0a0a0a"/>
  <g fill="#00bcd4" font-family="'Anaheim','Helvetica Neue',Arial,sans-serif" font-weight="900" text-rendering="geometricPrecision">
    <text x="50" y="64" font-size="56" text-anchor="middle" letter-spacing="-2">MJ</text>
  </g>
  <rect x="22" y="78" width="56" height="4" rx="2" fill="#e91e63"/>
</svg>
