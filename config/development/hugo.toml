################################# Default configuration ###################
baseURL = "http://localhost:1313/"
title = "Gateway Tech AEO — AI search optimization for St. Louis local businesses"
theme = "meghna"
# Default time zone for time stamps
timeZone = "America/Chicago"
# post pagination
pagination.pagerSize = 6
# post excerpt
summaryLength = 15
# disable language (we're only using English)
disableLanguages = []
hasCJKLanguage = false

############################# Build ##############################
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = '(js|scripts|javascript)'
[[build.cachebusters]]
source = 'assets/.*\.(css|sass|scss)$'
target = '(css|styles|scss|sass)'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'

############################# Outputs ##############################
[outputs]
home = ["HTML", "RSS"]

############################# Imaging ##############################
[imaging]
quality = 90
resampleFilter = "lanczos"

############################# Caches ###############################
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

############################# Markup ###############################
[markup]
[markup.goldmark.renderer]
unsafe = true

############################# Plugins ##########################
# css plugins
[[params.plugins.css]]
link = "plugins/bootstrap/bootstrap.purged.min.css"  # Purged: 152KB → 60KB (92KB savings)
[[params.plugins.css]]
link = "plugins/themify-icons/themify-icons.css"
# Removed unused plugins (magnific-popup, slick)
# fonts.css inlined in head.html for zero render-blocking

# js plugins
# jQuery removed - all JS is vanilla (Phase 5)
# Bootstrap.js removed - CSS-only framework (Phase 5)
# Removed unused plugins (slick, shuffle, magnific-popup) - 120KB savings
[[params.plugins.js]]
link = "plugins/lazy-load/lozad.min.js"

############################# Default Parameters ##########################
[params]
logo = "images/logo.png"
# Meta data
description = "Answer Engine Optimization for St. Louis local businesses. Get cited by ChatGPT, Perplexity, and Google's AI Overview — before your competitors do."
author = "Matthew Jamison"
# Google Analytics (add your tracking ID when ready)
google_analytics_id = ""
# post share
post_share = true

# preloader
[params.preloader]
enable = false
preloader = "images/logo.png"

# cookies
[params.cookies]
enable = false
expire_days = 2

# google map (disabled for now)
[params.map]
enable = false

############################# social marks ##########################
[[params.social]]
brand = "github"
label = "GitHub"
link = "https://github.com/MatthewJamisonJS"

[[params.social]]
brand = "linkedin"
label = "LinkedIn"
link = "https://www.linkedin.com/in/matthew-jamison-65486bab/"

################################ English Language ########################
[Languages.en]
languageName = "En"
languageCode = "en-us"
contentDir = "content/english"
weight = 1

[Languages.en.params]
home = "Home"
copyright = "Matthew Jamison"
