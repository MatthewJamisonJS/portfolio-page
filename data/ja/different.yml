different:
  enable: true
  title: "Gateway Tech AEOが違う理由。"
  subtitle: "1人のオペレーター。適格性優先、次に引用可能性。実行できるプランを。"
  blocks:
    audit_scope:
      heading: "3つの面を読みます。1つではなく。"
      body: "ほとんどのAEO業者は、エンジンがあなたを引用できるかどうかだけを確認します。私たちはクラシック検索（10件の青いリンク）、答えエンジン（ChatGPT、Perplexity、AI Overviews）、生成検索（引用そのもの）の3つにわたるあなたの可視性を読みます。1つのレポートで3つすべてをカバーします。不在の問題はAEOだけの問題であることはほとんどなく、各エンジンが信頼するソースはほとんど重なっていないため、1つのプレイブックでは機能しないからです。"
    pillars:
      heading: "3つの柱。いずれか1つを強化しない戦術は採用しません。"
      ref: "method"
    deliverable:
      heading: "実際に得られるもの。"
      body: "平易な言葉のプラン：何を、どの順番で修正するか、各修正の価値は何か。より深い実行プレイブックと監査ツールはエンゲージメントの範囲内に留まります。一回限りの診断、スコープ型実装、30日または90日プログラムから選べます。引き渡しではなく新たに構築するほうが理にかなっている場合は、パートナースタジオの[Jamison Software Solutions](https://jamisonsoftwaresolutions.com)と共同でお届けします。[メニューと料金を見る。](/pricing/)"
    trust:
      heading: "運営方針。"
      moves:
        - "権威より適格性を先に。クローラーが読めないサイトには引用構築は売りません。基盤が先、さもなければ何も定着しません。"
        - "私たちが触れるものはすべてあなたのものです：ドメイン、Google Business Profile、コンテンツ、アカウント。"
        - "スコープ固定のエンゲージメント、着手前に価格を提示。期限のない契約なし、ロックインなし——続けるかどうかは各フェーズで自分で決められます。"
        - "AI回答への掲載保証はしません。エビデンスが支持するものを実装し、それに対して誠実に報告します。引用を約束する人は、誰も守れないことを約束しています。"
    cta:
      pricing_label: "料金を見る"
      pricing_link: "/pricing/"
      brief_label: "ブリーフを送る"
      brief_link: "/#contact"
